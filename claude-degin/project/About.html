<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About — Insight Cast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
.about-hero{padding:112px 0 80px;background:linear-gradient(135deg,#fdf8f2 0%,#f0e5d0 100%)}
.mission-text{font-family:var(--serif);font-size:clamp(22px,3vw,34px);font-weight:700;line-height:1.6;color:var(--text)}
.mission-text em{color:var(--accent);font-style:normal}
.principle-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-top:44px}
.principle-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:32px;position:relative;overflow:hidden}
.principle-n{font-family:var(--serif);font-size:48px;font-weight:700;color:var(--border);position:absolute;top:16px;right:20px;line-height:1}
.principle-card h3{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--text);margin-bottom:12px}
.principle-card p{font-size:14px;color:var(--text2);line-height:1.85}
.company-table{width:100%;border-collapse:collapse;margin-top:40px}
.company-table tr{border-bottom:1px solid var(--border)}
.company-table tr:last-child{border-bottom:none}
.company-table th{padding:18px 24px;font-size:13px;font-weight:700;color:var(--text2);text-align:left;background:var(--bg2);width:200px;vertical-align:top}
.company-table td{padding:18px 24px;font-size:14px;color:var(--text);line-height:1.75}
.trust-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:40px}
.trust-card{text-align:center;padding:32px 20px;background:var(--surface);border:1px solid var(--border);border-radius:18px}
.trust-icon{font-size:36px;margin-bottom:16px}
.trust-card h3{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--text);margin-bottom:10px}
.trust-card p{font-size:14px;color:var(--text2);line-height:1.8}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shared/components.jsx"></script>
<script type="text/babel">
const {useState}=React;
const NAV=[['サービス','Service.html'],['料金','Pricing.html'],['キャスト','Cast.html'],['ブログ','Blog.html'],['About','About.html']];

function Nav(){
  const [sc,setSc]=useState(false);
  React.useEffect(()=>{const f=()=>setSc(window.scrollY>20);window.addEventListener('scroll',f);return()=>window.removeEventListener('scroll',f);},[]);
  return(
    <nav className={`pub-nav${sc?' scrolled':''}`}>
      <div className="pub-nav-inner">
        <a className="pub-logo" href="Top Page.html">Insight <em>Cast</em></a>
        <div className="pub-nav-links">{NAV.map(([l,h])=><a key={l} className={`pub-nav-link${l==='About'?' active':''}`} href={h}>{l}</a>)}</div>
        <div className="flex gap-3"><a className="btn btn-ghost btn-sm" href="Login.html">ログイン</a><a className="btn btn-primary btn-sm" href="Signup.html">無料で試す →</a></div>
      </div>
    </nav>
  );
}

function App(){
  return(
    <>
    <Nav/>
    {/* Hero */}
    <section className="about-hero">
      <div className="container">
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:64,alignItems:'center'}}>
          <div>
            <div className="label">About</div>
            <h1 className="display mt-3">一次情報に、<br/>価値を宿らせる</h1>
            <p className="body-lg mt-4">私たちは、小規模事業者が自分の言葉で情報を発信できる世界を目指しています。AIが取材し、あなたの話から言葉の資産を生み出す。それがInsight Castです。</p>
          </div>
          <div>
            <img src="uploads/about-team-hero.png" alt="キャストチーム" style={{borderRadius:24,width:'100%',boxShadow:'0 32px 80px rgba(0,0,0,.1)'}}/>
          </div>
        </div>
      </div>
    </section>

    {/* Mission */}
    <section className="section">
      <div className="container-sm">
        <div className="label">Mission</div>
        <div className="mission-text mt-4" style={{marginTop:20}}>
          <em>一次情報こそが、</em>小規模事業者の唯一の差別化である。<br/>
          AIが生成した文章に価値はなく、<br/>
          取材で引き出した<em>事実と体験</em>に価値がある。
        </div>
        <div className="accent-bar"/>
        <p className="body-lg mt-8" style={{marginTop:32}}>大手には真似できないことがあります。それは「あなたが体験した、あの出来事」です。毎日の仕事の中にある価値を掘り起こし、ホームページで伝えられる言葉にすること。それが私たちの仕事です。</p>
      </div>
    </section>

    {/* Trust points */}
    <section className="section" style={{background:'var(--bg2)'}}>
      <div className="container">
        <div className="label">Why We Exist</div>
        <h2 className="heading mt-3">私たちが大切にしていること</h2>
        <div className="trust-grid">
          {[
            {icon:'🎤',t:'取材から始める',d:'情報を「生成」するのではなく、まず「引き出す」。あなたの経験・言葉・判断が素材です。'},
            {icon:'📖',t:'一次情報の尊重',d:'あなた自身の体験にしか語れないことがある。その固有性こそが、信頼につながります。'},
            {icon:'🌱',t:'継続的に育てる',d:'一度作って終わりではなく、取材を重ねることでホームページが育っていく仕組みをつくります。'},
          ].map(t=>(
            <div key={t.t} className="trust-card">
              <div className="trust-icon">{t.icon}</div>
              <h3>{t.t}</h3>
              <p>{t.d}</p>
            </div>
          ))}
        </div>
      </div>
    </section>

    {/* Principles */}
    <section className="section">
      <div className="container">
        <div className="label">Principles</div>
        <h2 className="heading mt-3">行動指針</h2>
        <div className="principle-grid">
          {[
            {n:'01',t:'取材なしにコンテンツを語らない',d:'情報の素材は取材から。AIだけで生成した文章を、あなたの言葉として届けません。'},
            {n:'02',t:'一歩ずつ、確実に前進する',d:'完璧を目指して止まるより、小さく始めて継続することに価値があります。'},
            {n:'03',t:'技術ではなく、価値に焦点を当てる',d:'どんなに高度な技術も、伝えるべき価値のために使います。技術が目的になりません。'},
            {n:'04',t:'事業者の言葉を大切にする',d:'生成した文章に過度に依存せず、あなた自身の言葉で整えることを推奨します。'},
          ].map(p=>(
            <div key={p.n} className="principle-card">
              <div className="principle-n">{p.n}</div>
              <h3>{p.t}</h3>
              <p>{p.d}</p>
            </div>
          ))}
        </div>
      </div>
    </section>

    {/* Cast team */}
    <section className="section" style={{background:'var(--bg2)'}}>
      <div className="container">
        <div className="label">Our Cast</div>
        <h2 className="heading mt-3">取材チームを紹介します</h2>
        <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:16,marginTop:40}}>
          {[
            {name:'ミント',role:'Story Listener',img:'uploads/portrait-half-e56f0f59.png'},
            {name:'クラウス',role:'Industry Editor',img:'uploads/portrait-half.png'},
            {name:'レイン',role:'Message Strategist',img:'uploads/portrait-half-c748dc68.png'},
            {name:'ハル',role:'Atmosphere Finder',img:'uploads/portrait-half-134e2225.png'},
            {name:'モグロ',role:'Yes / No Deep Dive',img:'uploads/portrait-half-29476351.png'},
            {name:'コッコ',role:'Campaign Voice',img:'uploads/portrait-half-35f1e736.png'},
          ].map((c,i)=>(
            <div key={c.name} style={{textAlign:'center'}}>
              <div style={{borderRadius:16,overflow:'hidden',border:'1.5px solid var(--border)',marginBottom:10,opacity:i>2?.7:1}}>
                <img src={c.img} alt={c.name} style={{width:'100%',aspectRatio:'1/1',objectFit:'cover',objectPosition:'top'}}/>
              </div>
              <div style={{fontFamily:'var(--serif)',fontSize:15,fontWeight:700,color:'var(--text)',marginBottom:3}}>{c.name}</div>
              <div style={{fontSize:11,color:'var(--accent)',fontWeight:600,letterSpacing:'.06em'}}>{c.role}</div>
              {i>2&&<span className="badge badge-gray mt-2" style={{marginTop:6,fontSize:10}}>準備中</span>}
            </div>
          ))}
        </div>
        <div className="text-center mt-8" style={{marginTop:32}}>
          <a className="btn btn-outline" href="Cast.html">キャストの詳細を見る →</a>
        </div>
      </div>
    </section>

    {/* Company */}
    <section className="section">
      <div className="container-sm">
        <div className="label">Company</div>
        <h2 className="heading mt-3">会社概要</h2>
        <div className="table-wrap mt-10" style={{marginTop:40}}>
          <table className="company-table">
            {[
              ['会社名','株式会社インサイトキャスト'],
              ['設立','2025年10月'],
              ['代表者','代表取締役 山田 太郎'],
              ['所在地','東京都渋谷区〇〇 1-2-3'],
              ['事業内容','AIを活用したコンテンツ制作支援サービスの開発・運営'],
              ['サービス名','Insight Cast'],
            ].map(([k,v])=>(
              <tr key={k}><th>{k}</th><td>{v}</td></tr>
            ))}
          </table>
        </div>
      </div>
    </section>

    <div className="final-cta">
      <h2>あなたの話から、言葉の資産をつくろう</h2>
      <p>取材から始まる、新しいコンテンツ制作の形。まず無料で体験してみてください。</p>
      <div className="cta-actions">
        <a className="btn btn-white btn-lg" href="Signup.html">無料で取材を始める →</a>
        <a className="btn btn-ghost-white" href="Service.html">サービスを見る</a>
      </div>
    </div>
    <footer className="pub-footer"><div className="pub-footer-in"><div className="f-logo">Insight Cast</div><div className="f-links">{['プライバシーポリシー','利用規約','特定商取引法に基づく表記'].map(l=><span key={l} className="f-link">{l}</span>)}</div><div className="f-copy">© 2026 Insight Cast</div></div></footer>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
