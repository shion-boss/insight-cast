<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ブログ — Insight Cast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.blog-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;cursor:pointer;transition:transform .22s,box-shadow .22s}
.blog-card:hover{transform:translateY(-4px);box-shadow:0 16px 48px var(--shadow)}
.blog-cover{height:180px;display:flex;align-items:center;justify-content:center;font-size:40px;position:relative}
.blog-type-badge{position:absolute;top:14px;right:14px}
.blog-body{padding:22px 24px}
.blog-cat{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.blog-title{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--text);line-height:1.5;margin-bottom:10px}
.blog-excerpt{font-size:13px;color:var(--text2);line-height:1.75;margin-bottom:14px}
.blog-meta{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:12px}
.filter-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:32px;margin-bottom:40px}
.filter-tab{padding:7px 16px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-family:var(--sans)}
.filter-tab:hover{border-color:var(--accent);color:var(--accent)}
.filter-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.featured-post{background:var(--surface);border:1px solid var(--border);border-radius:22px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;margin-bottom:40px;cursor:pointer;transition:box-shadow .22s}
.featured-post:hover{box-shadow:0 16px 48px var(--shadow)}
.featured-cover{display:flex;align-items:center;justify-content:center;font-size:64px;background:linear-gradient(135deg,#fdf0e4,#f5dcc0)}
.featured-body{padding:40px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shared/components.jsx"></script>
<script type="text/babel">
const {useState}=React;
const NAV=[['サービス','Service.html'],['料金','Pricing.html'],['キャスト','Cast.html'],['ブログ','Blog.html'],['About','About.html']];
const CATS=['すべて','ノウハウ','サービス','事例','思想'];
const POSTS=[
  {cat:'ノウハウ',t:'ホームページを更新し続けるために必要な「取材思考」とは',ex:'更新が止まる本当の理由は、コンテンツのアイデアがないのではなく、日常の中にある価値を見落としているからです。',date:'2026.04.10',color:'#fdf0e4',icon:'📝',type:'normal',featured:true},
  {cat:'サービス',t:'AIキャスト「クラウス」が専門業種の強みを引き出す仕組み',ex:'業種知識を背景に持つクラウスは、なぜその材料・工法・判断を選んでいるかを深掘りすることで、競合との違いを言語化します。',date:'2026.03.28',color:'#e0f5f3',icon:'🦉',type:'interview'},
  {cat:'事例',t:'工務店が3ヶ月でコンテンツを5本作った話',ex:'「何を書けばいいか分からなかった」という田中建設の代表が、Insight Castを使い始めて変わったこと。',date:'2026.03.15',color:'#f5ede0',icon:'🏠',type:'interview'},
  {cat:'思想',t:'一次情報こそが、小規模事業者の唯一の差別化である',ex:'大手にできないことがある。それは「あなたが体験した、あの出来事」だ。AIが生成した文章に価値はなく、取材で引き出した事実に価値がある。',date:'2026.03.05',color:'#f0ede8',icon:'💡',type:'normal'},
  {cat:'ノウハウ',t:'キャストの選び方ガイド：ミント・クラウス・レインの違いと使い分け',ex:'3名のキャストはそれぞれ異なる角度で取材します。目的に合わせた選び方を解説します。',date:'2026.02.20',color:'#e8f0e8',icon:'🎭',type:'normal'},
  {cat:'サービス',t:'HP分析レポートの読み方と、次の取材テーマの決め方',ex:'Insight Castが出力する調査レポートをどう活かすか。取材テーマの選び方と優先順位のつけ方を解説します。',date:'2026.02.08',color:'#fdf0e4',icon:'📊',type:'normal'},
];

function Nav(){
  const [sc,setSc]=useState(false);
  React.useEffect(()=>{const f=()=>setSc(window.scrollY>20);window.addEventListener('scroll',f);return()=>window.removeEventListener('scroll',f);},[]);
  return(
    <nav className={`pub-nav${sc?' scrolled':''}`}>
      <div className="pub-nav-inner">
        <a className="pub-logo" href="Top Page.html">Insight <em>Cast</em></a>
        <div className="pub-nav-links">{NAV.map(([l,h])=><a key={l} className={`pub-nav-link${l==='ブログ'?' active':''}`} href={h}>{l}</a>)}</div>
        <div className="flex gap-3"><a className="btn btn-ghost btn-sm" href="Login.html">ログイン</a><a className="btn btn-primary btn-sm" href="Signup.html">無料で試す →</a></div>
      </div>
    </nav>
  );
}

function App(){
  const [cat,setCat]=useState('すべて');
  const featured=POSTS.find(p=>p.featured);
  const filtered=POSTS.filter(p=>cat==='すべて'||p.cat===cat);
  const rest=filtered.filter(p=>!p.featured||cat!=='すべて');
  return(
    <>
    <Nav/>
    <section className="pub-hero-sm">
      <div className="container">
        <div className="label">Blog</div>
        <h1 className="display mt-3">記事一覧</h1>
        <p className="body-lg mt-3">ホームページ更新・コンテンツ制作・一次情報の活かし方など、事業者の発信を支えるノウハウをお届けします。</p>
        <div className="filter-tabs">
          {CATS.map(c=><button key={c} className={`filter-tab${cat===c?' active':''}`} onClick={()=>setCat(c)}>{c}</button>)}
        </div>
        {cat==='すべて'&&featured&&(
          <div className="featured-post">
            <div className="featured-cover">{featured.icon}</div>
            <div className="featured-body">
              <div className="flex gap-3 mb-4" style={{marginBottom:16}}>
                <span className="badge badge-amber">{featured.cat}</span>
                {featured.type==='interview'&&<span className="badge badge-teal">インタビュー</span>}
                <span className="badge badge-gray">注目記事</span>
              </div>
              <div className="blog-title" style={{fontSize:22,marginBottom:14}}>{featured.t}</div>
              <div className="blog-excerpt" style={{fontSize:15}}>{featured.ex}</div>
              <div className="blog-meta" style={{marginTop:16}}><span>{featured.date}</span></div>
            </div>
          </div>
        )}
        <div className="blog-grid">
          {rest.map((p,i)=>(
            <div className="blog-card" key={i}>
              <div className="blog-cover" style={{background:p.color}}>
                {p.icon}
                {p.type==='interview'&&<span className="blog-type-badge badge badge-teal">インタビュー</span>}
              </div>
              <div className="blog-body">
                <div className="blog-cat">{p.cat}</div>
                <div className="blog-title">{p.t}</div>
                <div className="blog-excerpt">{p.ex}</div>
                <div className="blog-meta"><span>{p.date}</span></div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
    <div style={{height:80}}/>
    <div className="final-cta">
      <h2>実際に取材を体験してみる</h2>
      <p>読むだけより、体験するほうが早い。今すぐ無料で始められます。</p>
      <div className="cta-actions">
        <a className="btn btn-white btn-lg" href="Signup.html">無料で取材を始める →</a>
      </div>
    </div>
    <footer className="pub-footer"><div className="pub-footer-in"><div className="f-logo">Insight Cast</div><div className="f-links">{['プライバシーポリシー','利用規約','特定商取引法に基づく表記'].map(l=><span key={l} className="f-link">{l}</span>)}</div><div className="f-copy">© 2026 Insight Cast</div></div></footer>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
