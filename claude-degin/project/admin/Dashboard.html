<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理ダッシュボード — Insight Cast Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
.admin-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.post-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.post-row:last-child{border-bottom:none}
.post-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;max-width:360px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.post-meta{font-size:12px;color:var(--text3)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../shared/components.jsx"></script>
<script type="text/babel">
const RECENT_POSTS=[
  {title:'ホームページを更新し続けるために必要な「取材思考」とは',cat:'ノウハウ',date:'2026.04.10',published:true},
  {title:'AIキャスト「クラウス」が専門業種の強みを引き出す仕組み',cat:'サービス',date:'2026.03.28',published:true},
  {title:'工務店が3ヶ月でコンテンツを5本作った話',cat:'事例',date:'2026.03.15',published:true},
  {title:'一次情報こそが、小規模事業者の唯一の差別化である',cat:'思想',date:'2026.03.05',published:false},
  {title:'キャストの選び方ガイド：ミント・クラウス・レインの違いと使い分け',cat:'ノウハウ',date:'2026.02.20',published:true},
];

function App(){
  return(
    <AdminShell active="ダッシュボード" title="管理ダッシュボード">
      {/* Stats */}
      <div className="admin-stat-grid">
        {[
          {n:'6',l:'総記事数',d:'先月比 +2'},
          {n:'5',l:'公開中',d:''},
          {n:'1',l:'下書き',d:''},
          {n:'2,841',l:'今月PV',d:'先月比 +18%'},
        ].map(s=>(
          <div key={s.l} className="stat-card">
            <div className="stat-n">{s.n}</div>
            <div className="stat-l">{s.l}</div>
            {s.d&&<div style={{fontSize:12,color:'var(--teal)',marginTop:4,fontWeight:600}}>{s.d}</div>}
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:24}}>
        {/* Posts */}
        <div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
            <h2 style={{fontFamily:'var(--serif)',fontSize:18,fontWeight:700}}>最近の記事</h2>
            <a className="btn btn-primary btn-sm" href="Posts.html">+ 新しい記事</a>
          </div>
          <div className="card" style={{padding:'0 20px'}}>
            {RECENT_POSTS.map((p,i)=>(
              <div key={i} className="post-row">
                <div style={{flex:1,minWidth:0,marginRight:16}}>
                  <div className="post-title">{p.title}</div>
                  <div className="post-meta">{p.cat} · {p.date}</div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
                  <span className={`badge ${p.published?'badge-ok':'badge-gray'}`}>{p.published?'公開中':'下書き'}</span>
                  <a className="btn btn-ghost btn-xs" href="PostEdit.html">編集</a>
                </div>
              </div>
            ))}
          </div>
          <div style={{marginTop:12,textAlign:'right'}}>
            <a className="btn btn-ghost btn-sm" href="Posts.html">すべて見る →</a>
          </div>
        </div>

        {/* Side info */}
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div className="stat-card">
            <h3 style={{fontFamily:'var(--serif)',fontSize:15,fontWeight:700,marginBottom:14}}>カテゴリ別</h3>
            {[['ノウハウ',2],['サービス',2],['事例',1],['思想',1]].map(([c,n])=>(
              <div key={c} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 0',fontSize:13}}>
                <span style={{color:'var(--text2)'}}>{c}</span>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{width:60,height:4,background:'var(--bg2)',borderRadius:2,overflow:'hidden'}}>
                    <div style={{height:'100%',background:'var(--accent)',borderRadius:2,width:`${(n/2)*100}%`}}/>
                  </div>
                  <span style={{fontWeight:700,color:'var(--text)',width:16,textAlign:'right'}}>{n}</span>
                </div>
              </div>
            ))}
          </div>
          <div className="stat-card">
            <h3 style={{fontFamily:'var(--serif)',fontSize:15,fontWeight:700,marginBottom:14}}>クイックアクション</h3>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <a className="btn btn-primary btn-sm w-full" href="PostEdit.html" style={{justifyContent:'center'}}>+ 新しい記事を書く</a>
              <a className="btn btn-outline btn-sm w-full" href="../Top Page.html" style={{justifyContent:'center'}}>公開サイトを確認 →</a>
            </div>
          </div>
        </div>
      </div>
    </AdminShell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
