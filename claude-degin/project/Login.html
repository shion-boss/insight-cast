<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン — Insight Cast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fdf8f2 0%,#f0e5d0 100%)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:48px;width:440px;box-shadow:0 24px 64px rgba(0,0,0,.08)}
.google-btn{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-size:14px;font-weight:600;color:var(--text);font-family:var(--sans);transition:all .2s;margin-bottom:24px}
.google-btn:hover{border-color:var(--accent);box-shadow:0 2px 8px var(--shadow)}
.divider-label{display:flex;align-items:center;gap:12px;margin-bottom:24px;font-size:12px;color:var(--text3)}
.divider-label::before,.divider-label::after{content:'';flex:1;height:1px;background:var(--border)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
function App(){
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const submit=e=>{e.preventDefault();if(!email||!pw){setErr('メールアドレスとパスワードを入力してください');return;}window.location.href='app/Dashboard.html';};
  return(
    <div className="login-card">
      <a href="Top Page.html" style={{fontSize:13,color:'var(--text3)',display:'block',marginBottom:24}}>← Insight Cast に戻る</a>
      <div style={{textAlign:'center',marginBottom:32}}>
        <div style={{fontFamily:'var(--serif)',fontSize:22,fontWeight:700,color:'var(--text)',marginBottom:6}}>Insight <span style={{color:'var(--accent)'}}>Cast</span></div>
        <div style={{fontFamily:'var(--serif)',fontSize:22,fontWeight:700,color:'var(--text)'}}>ログイン</div>
      </div>
      <button className="google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Google でログインする
      </button>
      <div className="divider-label">または</div>
      <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:16}}>
        <div className="form-group">
          <label className="form-label">メールアドレス</label>
          <input className="input" type="email" placeholder="hello@example.com" value={email} onChange={e=>setEmail(e.target.value)}/>
        </div>
        <div className="form-group">
          <label className="form-label">パスワード</label>
          <input className="input" type="password" placeholder="パスワード" value={pw} onChange={e=>setPw(e.target.value)}/>
          <a style={{fontSize:12,color:'var(--accent)',cursor:'pointer',textAlign:'right',marginTop:4,display:'block'}}>パスワードをお忘れですか？</a>
        </div>
        {err&&<div className="error-msg">⚠ {err}</div>}
        <button className="btn btn-primary w-full" style={{justifyContent:'center',padding:'13px'}}>ログインする →</button>
      </form>
      <div style={{textAlign:'center',marginTop:24,fontSize:14,color:'var(--text2)'}}>
        アカウントをお持ちでない方は <a href="Signup.html" style={{color:'var(--accent)',fontWeight:600}}>新規登録</a>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
