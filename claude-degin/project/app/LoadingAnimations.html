<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI アニメーション — Insight Cast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ── GLOBAL ── */
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Noto Sans JP',sans-serif;color:var(--text)}

/* ── DEMO SHELL ── */
.demo-shell{min-height:100vh;display:flex;flex-direction:column}
.demo-topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.demo-logo{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:700;color:var(--text)}
.demo-logo em{color:var(--accent);font-style:normal}
.demo-tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:3px;margin-left:auto}
.demo-tab{padding:6px 14px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .18s;border:none;background:transparent;font-family:'Noto Sans JP',sans-serif}
.demo-tab.active{background:var(--surface);color:var(--accent);box-shadow:0 1px 6px rgba(0,0,0,.07)}
.demo-body{flex:1;display:flex;align-items:center;justify-content:center;padding:40px}

/* ── LOADING OVERLAY (full-screen modal style) ── */
.loading-card{width:520px;background:var(--surface);border:1px solid var(--border);border-radius:24px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.12)}
.loading-card-header{padding:22px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px}
.loading-card-body{padding:36px 32px 40px}

/* ── SCAN ANIMATION ── */
.scan-container{width:100%;height:180px;background:var(--bg2);border-radius:14px;border:1px solid var(--border);overflow:hidden;position:relative;margin:24px 0}
.scan-site-mock{padding:16px 18px;display:flex;flex-direction:column;gap:8px;opacity:.55}
.mock-bar{height:10px;background:var(--border);border-radius:4px;animation:pulse 1.6s ease-in-out infinite}
.mock-bar.w-full{width:100%}
.mock-bar.w-3q{width:75%}
.mock-bar.w-half{width:50%}
.mock-bar.w-1q{width:28%}
.mock-bar.title{height:14px;width:55%;background:var(--border2)}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.scan-beam{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scandown 2s ease-in-out infinite}
@keyframes scandown{0%{top:-3px;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:183px;opacity:0}}
.scan-highlight{position:absolute;left:0;right:0;height:36px;background:rgba(194,114,42,.08);animation:scandown2 2s ease-in-out infinite;pointer-events:none}
@keyframes scandown2{0%{top:-36px}100%{top:180px}}

/* ── PROGRESS STEPS ── */
.progress-steps{display:flex;flex-direction:column;gap:10px;margin-top:20px}
.progress-step{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:10px;transition:background .2s}
.progress-step.done{background:var(--ok-l)}
.progress-step.active{background:var(--accent-l)}
.progress-step.idle{background:var(--bg2);opacity:.6}
.step-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.step-icon.done{background:var(--ok);color:#fff}
.step-icon.active{background:var(--accent);color:#fff}
.step-icon.idle{background:var(--border);color:var(--text3)}
.step-label{font-size:13px;font-weight:600}
.progress-step.done .step-label{color:var(--ok)}
.progress-step.active .step-label{color:var(--accent)}
.progress-step.idle .step-label{color:var(--text3)}
.step-sub{font-size:11px;color:var(--text3);margin-top:2px}
.progress-step.active .step-sub{color:var(--accent);opacity:.75}

/* ── SPINNER VARIANTS ── */
.orbit{width:72px;height:72px;position:relative;margin:0 auto}
.orbit-ring{position:absolute;inset:0;border-radius:50%;border:2.5px solid transparent}
.orbit-ring.r1{border-top-color:var(--accent);animation:orb 1.1s linear infinite}
.orbit-ring.r2{inset:10px;border-right-color:var(--accent);opacity:.5;animation:orb 1.7s linear infinite reverse}
.orbit-ring.r3{inset:20px;border-bottom-color:var(--accent);opacity:.3;animation:orb 2.3s linear infinite}
.orbit-center{position:absolute;inset:28px;border-radius:50%;background:var(--accent-l);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--accent)}
@keyframes orb{to{transform:rotate(360deg)}}

/* ── CAST TYPING ── */
.cast-typing-wrap{display:flex;gap:14px;align-items:flex-start;padding:16px;background:var(--bg2);border-radius:14px;margin:20px 0}
.cast-typing-avt{width:44px;height:44px;border-radius:50%;overflow:hidden;border:2px solid var(--accent);flex-shrink:0}
.cast-typing-avt img{width:100%;height:100%;object-fit:cover;object-position:top}
.cast-bubble-typing{background:var(--surface);border:1px solid var(--border);border-radius:14px;border-top-left-radius:3px;padding:12px 16px}
.typing-dots{display:flex;gap:5px;align-items:center;height:20px}
.typing-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);animation:tdot 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.18s}
.typing-dot:nth-child(3){animation-delay:.36s}
@keyframes tdot{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}
.cast-status{font-size:12px;font-weight:600;color:var(--teal);margin-top:6px}

/* ── WRITING ANIMATION ── */
.writing-wrap{margin:20px 0}
.writing-doc{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden}
.writing-cursor{display:inline-block;width:2px;height:1em;background:var(--accent);vertical-align:text-bottom;animation:blink .8s step-end infinite;margin-left:1px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.writing-line{height:13px;background:var(--bg2);border-radius:3px;margin-bottom:8px;position:relative;overflow:hidden}
.writing-fill{position:absolute;inset:0;background:var(--border);border-radius:3px;transform-origin:left}
.writing-h{height:17px;width:70%;background:var(--border2);border-radius:4px;margin-bottom:14px}
.writing-shimmer{position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.5) 50%,transparent 100%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── AI BADGE ── */
.ai-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:var(--accent-l);color:var(--accent);border-radius:100px;font-size:11px;font-weight:700;border:1px solid rgba(194,114,42,.25);letter-spacing:.05em}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:aipulse 1s ease-in-out infinite}
@keyframes aipulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.6}}

/* ── COMPLETE STATE ── */
.complete-card{text-align:center;padding:40px 32px}
.complete-icon{font-size:56px;margin-bottom:16px;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes popIn{0%{transform:scale(0)}100%{transform:scale(1)}}
.confetti-dots{display:flex;gap:6px;justify-content:center;margin:12px 0 20px;flex-wrap:wrap}
.conf-dot{width:8px;height:8px;border-radius:50%;animation:confettifall .8s ease-out forwards}
@keyframes confettifall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(12px) rotate(180deg);opacity:0}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

/* ─── SCENE 1: HP分析中 ─── */
function AnalyzingScene({onDone}){
  const [tick,setTick]=useState(0);
  const STEPS=[
    {l:'URLを取得中',sub:'ページ構造を読み込んでいます'},
    {l:'コンテンツを解析中',sub:'情報量・訴求の強さを評価しています'},
    {l:'競合サイトと比較中',sub:'3社のサイトと比較しています'},
    {l:'取材テーマを提案する',sub:'分析完了後に提案します'},
  ];
  useEffect(()=>{
    if(tick>=STEPS.length)return;
    const t=setTimeout(()=>setTick(i=>i+1),tick===0?600:1100);
    return()=>clearTimeout(t);
  },[tick]);
  const done=tick>=STEPS.length;
  useEffect(()=>{if(done)setTimeout(onDone,900);},[done]);
  return(
    <div className="loading-card">
      <div className="loading-card-header">
        <div className="ai-badge"><div className="ai-dot"/>AI分析中</div>
        <div style={{flex:1,minWidth:0,marginLeft:4}}>
          <div style={{fontFamily:'Noto Serif JP',fontSize:15,fontWeight:700,color:'var(--text)'}}>ホームページを分析しています</div>
          <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>田中建設株式会社</div>
        </div>
      </div>
      <div className="loading-card-body">
        {/* Scan animation */}
        <div className="scan-container">
          <div className="scan-beam"/>
          <div className="scan-highlight"/>
          <div className="scan-site-mock">
            <div className="mock-bar title"/>
            <div className="mock-bar w-full" style={{animationDelay:'.1s'}}/>
            <div className="mock-bar w-3q" style={{animationDelay:'.2s'}}/>
            <div style={{display:'flex',gap:8,marginTop:4}}>
              <div className="mock-bar" style={{width:'30%',animationDelay:'.3s'}}/>
              <div className="mock-bar" style={{width:'30%',animationDelay:'.4s'}}/>
            </div>
            <div className="mock-bar w-full" style={{marginTop:8,animationDelay:'.5s'}}/>
            <div className="mock-bar w-half" style={{animationDelay:'.6s'}}/>
          </div>
        </div>

        {/* Steps */}
        <div className="progress-steps">
          {STEPS.map((s,i)=>{
            const state=i<tick?'done':i===tick?'active':'idle';
            return(
              <div key={i} className={`progress-step ${state}`}>
                <div className={`step-icon ${state}`}>
                  {state==='done'?'✓':state==='active'?<span style={{animation:'orb 1s linear infinite',display:'inline-block'}}>◌</span>:i+1}
                </div>
                <div>
                  <div className="step-label">{s.l}</div>
                  {state==='active'&&<div className="step-sub">{s.sub}</div>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ─── SCENE 2: AI取材中（ミントが考えている） ─── */
function InterviewingScene({onDone}){
  const MESSAGES=[
    {side:'cast',text:'今日はよろしくお願いします！まず、最近お客様から「ありがとう」と言われた仕事を教えてもらえますか？'},
    {side:'user',text:'先月、外壁塗装したお客様から「ここに住み続けられる気がした」と言ってもらえました。'},
    {side:'cast',text:'素敵なエピソードですね。その工事で特にこだわったことはありましたか？'},
  ];
  const [shown,setShown]=useState(0);
  const [typing,setTyping]=useState(true);
  useEffect(()=>{
    if(shown>=MESSAGES.length){setTimeout(onDone,800);return;}
    const t=setTyping(true);
    const t2=setTimeout(()=>{setTyping(false);setShown(i=>i+1);},shown===0?800:1400);
    return()=>clearTimeout(t2);
  },[shown]);
  return(
    <div className="loading-card">
      <div className="loading-card-header">
        <img src="../uploads/portrait-half-e56f0f59.png" style={{width:40,height:40,borderRadius:'50%',objectFit:'cover',objectPosition:'top',border:'2px solid var(--accent)'}} alt="ミント"/>
        <div>
          <div style={{fontFamily:'Noto Serif JP',fontSize:15,fontWeight:700,color:'var(--text)'}}>ミントが取材しています</div>
          <div style={{fontSize:12,color:'var(--teal)',fontWeight:600,marginTop:2}}>Story Listener · 取材中</div>
        </div>
        <span className="ai-badge" style={{marginLeft:'auto'}}><div className="ai-dot"/>取材中</span>
      </div>
      <div className="loading-card-body" style={{paddingBottom:28}}>
        {/* Progress bar */}
        <div style={{marginBottom:24}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'var(--text3)',marginBottom:6}}>
            <span>取材の進捗</span>
            <span>{shown} / 7 問</span>
          </div>
          <div style={{height:5,background:'var(--bg2)',borderRadius:3,overflow:'hidden'}}>
            <div style={{height:'100%',background:'var(--accent)',borderRadius:3,width:`${(shown/7)*100}%`,transition:'width .5s ease'}}/>
          </div>
        </div>

        {/* Chat log */}
        <div style={{display:'flex',flexDirection:'column',gap:14,minHeight:160}}>
          {MESSAGES.slice(0,shown).map((m,i)=>(
            <div key={i} style={{display:'flex',gap:10,flexDirection:m.side==='user'?'row-reverse':'row',animation:'fadeIn .3s ease'}}>
              {m.side==='cast'&&<img src="../uploads/portrait-half-e56f0f59.png" style={{width:32,height:32,borderRadius:'50%',objectFit:'cover',objectPosition:'top',border:'1.5px solid var(--border)',flexShrink:0}} alt=""/>}
              {m.side==='user'&&<div style={{width:32,height:32,borderRadius:'50%',background:'var(--accent-l)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'var(--accent)',flexShrink:0,border:'1.5px solid var(--border)'}}>あ</div>}
              <div style={{maxWidth:'82%',padding:'10px 14px',borderRadius:14,fontSize:13,lineHeight:1.75,
                background:m.side==='cast'?'var(--surface)':'var(--accent)',
                border:m.side==='cast'?'1px solid var(--border)':'none',
                color:m.side==='cast'?'var(--text)':'#fff',
                borderTopLeftRadius:m.side==='cast'?3:14,
                borderTopRightRadius:m.side==='user'?3:14}}>
                {m.text}
              </div>
            </div>
          ))}
          {typing&&shown<MESSAGES.length&&(
            <div style={{display:'flex',gap:10,animation:'fadeIn .25s ease'}}>
              <img src="../uploads/portrait-half-e56f0f59.png" style={{width:32,height:32,borderRadius:'50%',objectFit:'cover',objectPosition:'top',border:'1.5px solid var(--border)',flexShrink:0}} alt=""/>
              <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:14,borderTopLeftRadius:3,padding:'12px 16px',display:'flex',gap:5,alignItems:'center'}}>
                <div className="typing-dot"/><div className="typing-dot"/><div className="typing-dot"/>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ─── SCENE 3: 記事生成中 ─── */
function GeneratingScene({onDone}){
  const [progress,setProgress]=useState(0);
  const [phase,setPhase]=useState(0);// 0=整理 1=構成 2=執筆
  const PHASES=['取材メモを整理中','記事の構成を作成中','記事を書いています'];
  const TEXT_LINES=[
    {w:'72%',delay:0},{w:'100%',delay:.4},{w:'88%',delay:.8},
    {w:'60%',delay:1.2},{w:'100%',delay:1.6},{w:'95%',delay:2.0},
    {w:'78%',delay:2.4},
  ];
  useEffect(()=>{
    const t=setInterval(()=>{
      setProgress(p=>{
        const next=p+1.8;
        if(next>=100){clearInterval(t);setTimeout(onDone,700);return 100;}
        if(next>=66) setPhase(2);
        else if(next>=33) setPhase(1);
        return next;
      });
    },60);
    return()=>clearInterval(t);
  },[]);
  return(
    <div className="loading-card">
      <div className="loading-card-header">
        <div className="orbit" style={{width:44,height:44}}>
          <div className="orbit-ring r1" style={{inset:0}}/>
          <div className="orbit-ring r2" style={{inset:8}}/>
          <div className="orbit-center" style={{inset:16,fontSize:8}}>AI</div>
        </div>
        <div>
          <div style={{fontFamily:'Noto Serif JP',fontSize:15,fontWeight:700,color:'var(--text)'}}>記事素材を生成しています</div>
          <div style={{fontSize:12,color:'var(--accent)',fontWeight:600,marginTop:2}}>{PHASES[phase]}</div>
        </div>
        <span style={{marginLeft:'auto',fontFamily:'Noto Serif JP',fontSize:18,fontWeight:700,color:'var(--accent)'}}>{Math.round(progress)}%</span>
      </div>
      <div className="loading-card-body">
        {/* Big progress bar */}
        <div style={{height:8,background:'var(--bg2)',borderRadius:4,overflow:'hidden',marginBottom:28}}>
          <div style={{height:'100%',background:'linear-gradient(90deg,var(--accent),var(--teal))',borderRadius:4,width:`${progress}%`,transition:'width .1s linear',position:'relative'}}>
            <div style={{position:'absolute',right:0,top:0,bottom:0,width:40,background:'linear-gradient(90deg,transparent,rgba(255,255,255,.4))',animation:'shimmer 1s infinite'}}/>
          </div>
        </div>

        {/* Live writing preview */}
        <div className="writing-doc">
          <div className="writing-h" style={{position:'relative',overflow:'hidden'}}>
            {progress>10&&<div className="writing-shimmer"/>}
          </div>
          {TEXT_LINES.map((l,i)=>(
            <div key={i} className="writing-line" style={{width:l.w,opacity:progress>l.delay*15?1:0,transition:'opacity .3s ease'}}>
              {progress>l.delay*15&&progress<95&&<div className="writing-shimmer"/>}
            </div>
          ))}
          {progress>40&&(
            <div style={{marginTop:16,paddingTop:14,borderTop:'1px solid var(--border)'}}>
              <div className="writing-h" style={{width:'45%',position:'relative',overflow:'hidden'}}>
                {progress<95&&<div className="writing-shimmer"/>}
              </div>
              {[{w:'100%'},{w:'90%'},{w:'55%'}].map((l,i)=>(
                <div key={i} className="writing-line" style={{width:l.w,opacity:progress>55+i*12?1:0,transition:'opacity .3s ease'}}>
                  {progress>55+i*12&&progress<95&&<div className="writing-shimmer"/>}
                </div>
              ))}
            </div>
          )}
          {progress>=95&&<span className="writing-cursor"/>}
        </div>

        {/* Phase indicators */}
        <div style={{display:'flex',gap:8,marginTop:20}}>
          {PHASES.map((p,i)=>(
            <div key={i} style={{flex:1,padding:'8px 12px',borderRadius:8,background:phase>i?'var(--ok-l)':phase===i?'var(--accent-l)':'var(--bg2)',fontSize:11,fontWeight:600,color:phase>i?'var(--ok)':phase===i?'var(--accent)':'var(--text3)',textAlign:'center',transition:'all .3s'}}>
              {phase>i?'✓ ':''}{p}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ─── SCENE 4: 完了 ─── */
function CompleteScene({type,onRestart}){
  const CONF_COLORS=['var(--accent)','var(--teal)','#f59e0b','var(--ok)','#8b5cf6'];
  const msgs={
    analyze:{icon:'📊',title:'HP分析が完了しました',sub:'取材テーマの候補を3件提案しています。さっそく取材を始めてみましょう。',cta:'取材を始める →',href:'Interview.html'},
    interview:{icon:'🎤',title:'取材が完了しました',sub:'ミントが取材内容を整理しています。取材メモと記事テーマが確認できます。',cta:'取材メモを見る →',href:'Summary.html'},
    generate:{icon:'📄',title:'記事素材の生成が完了しました',sub:'記事素材が生成されました。コピーしてホームページに使ってください。',cta:'記事素材を見る →',href:'Article.html'},
  };
  const m=msgs[type]||msgs.generate;
  return(
    <div className="loading-card">
      <div className="complete-card">
        <div className="complete-icon">{m.icon}</div>
        <div className="confetti-dots">
          {CONF_COLORS.map((c,i)=>[0,1].map(j=>(
            <div key={`${i}-${j}`} className="conf-dot" style={{background:c,animationDelay:`${(i*2+j)*0.07}s`}}/>
          )))}
        </div>
        <h2 style={{fontFamily:'Noto Serif JP',fontSize:22,fontWeight:700,color:'var(--text)',marginBottom:10}}>{m.title}</h2>
        <p style={{fontSize:14,color:'var(--text2)',lineHeight:1.8,marginBottom:28,maxWidth:340,margin:'0 auto 28px'}}>{m.sub}</p>
        <div style={{display:'flex',gap:12,justifyContent:'center'}}>
          <a className="btn btn-primary" href={m.href} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'12px 24px',borderRadius:8,background:'var(--accent)',color:'#fff',fontWeight:600,fontSize:14,textDecoration:'none',border:'none',cursor:'pointer',fontFamily:'Noto Sans JP',transition:'all .2s'}}>{m.cta}</a>
          <button onClick={onRestart} style={{padding:'12px 20px',borderRadius:8,border:'1.5px solid var(--border)',background:'transparent',fontSize:14,fontWeight:600,color:'var(--text2)',cursor:'pointer',fontFamily:'Noto Sans JP',transition:'all .2s'}}>もう一度見る</button>
        </div>
      </div>
    </div>
  );
}

/* ─── MAIN APP ─── */
const SCENES=[
  {id:'analyze',label:'HP分析中'},
  {id:'interview',label:'取材中'},
  {id:'generate',label:'記事生成中'},
];

function App(){
  const [active,setActive]=useState('analyze');
  const [phase,setPhase]=useState('loading'); // loading | complete

  const switchScene=(id)=>{setActive(id);setPhase('loading');};

  return(
    <div className="demo-shell">
      {/* Top bar */}
      <div className="demo-topbar">
        <a href="Dashboard.html" style={{fontSize:13,color:'var(--text3)',textDecoration:'none',display:'flex',alignItems:'center',gap:4}}>← ダッシュボード</a>
        <div className="demo-logo" style={{marginLeft:8}}>Insight <em>Cast</em></div>
        <div className="demo-tabs">
          {SCENES.map(s=>(
            <button key={s.id} className={`demo-tab${active===s.id?' active':''}`} onClick={()=>switchScene(s.id)}>{s.label}</button>
          ))}
        </div>
      </div>

      {/* Scene */}
      <div className="demo-body">
        {phase==='loading'&&active==='analyze'&&(
          <AnalyzingScene key={`analyze-${Math.random()}`} onDone={()=>setPhase('complete')}/>
        )}
        {phase==='loading'&&active==='interview'&&(
          <InterviewingScene key={`interview-${Math.random()}`} onDone={()=>setPhase('complete')}/>
        )}
        {phase==='loading'&&active==='generate'&&(
          <GeneratingScene key={`generate-${Math.random()}`} onDone={()=>setPhase('complete')}/>
        )}
        {phase==='complete'&&(
          <CompleteScene type={active} onRestart={()=>setPhase('loading')}/>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<style>
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</body>
</html>
