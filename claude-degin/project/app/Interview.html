<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>取材チャット — Insight Cast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
body{height:100vh;overflow:hidden}
.interview-shell{display:flex;flex-direction:column;height:100vh;background:var(--bg)}
.iv-header{height:64px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.iv-cast-avt{width:40px;height:40px;border-radius:50%;overflow:hidden;border:2px solid var(--accent);flex-shrink:0}
.iv-cast-avt img{width:100%;height:100%;object-fit:cover;object-position:top}
.iv-progress{flex:1;max-width:240px}
.iv-progress-label{font-size:11px;color:var(--text3);margin-bottom:4px;display:flex;justify-content:space-between}
.chat-area{flex:1;overflow-y:auto;padding:28px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;gap:12px;max-width:720px}
.msg.user{flex-direction:row-reverse;margin-left:auto}
.msg-avt{width:36px;height:36px;border-radius:50%;flex-shrink:0;overflow:hidden;border:1.5px solid var(--border);background:var(--bg2)}
.msg-avt img{width:100%;height:100%;object-fit:cover;object-position:top}
.msg-bubble{padding:14px 18px;border-radius:18px;font-size:14px;line-height:1.78}
.msg-bubble.cast{background:var(--surface);border:1px solid var(--border);color:var(--text);border-top-left-radius:4px}
.msg-bubble.user{background:var(--accent);color:#fff;border-top-right-radius:4px}
.msg-time{font-size:11px;color:var(--text3);margin-top:5px;text-align:right}
.typing{display:flex;gap:4px;align-items:center;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:18px;border-top-left-radius:4px;width:fit-content}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);animation:blink 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.chat-input-bar{border-top:1px solid var(--border);background:var(--surface);padding:16px 24px;display:flex;gap:12px;align-items:flex-end;flex-shrink:0}
.chat-textarea{flex:1;padding:12px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-family:var(--sans);background:var(--bg);color:var(--text);resize:none;outline:none;line-height:1.6;max-height:140px;transition:border-color .2s}
.chat-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-l)}
.send-btn{width:44px;height:44px;border-radius:10px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.send-btn:hover{background:var(--accent-h);transform:translateY(-1px)}
.send-btn:disabled{background:var(--border);cursor:not-allowed;transform:none}
.finish-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200}
.finish-modal{background:var(--surface);border-radius:24px;padding:40px;max-width:440px;width:90%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.2)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect}=React;
const CAST={name:'ミント',role:'Story Listener',img:'../uploads/portrait-half-e56f0f59.png'};
const INIT_MESSAGES=[
  {side:'cast',text:'こんにちは！ミントです。今日は田中建設さんのお話を聞かせてもらいますね。\nまず、仕事をしていて「ああ、この仕事をやっていてよかったな」と思った瞬間を、最近で一つ教えていただけますか？'},
];
const AUTO_REPLIES=[
  'なるほど。それはとても素敵なエピソードですね。\nその工事で、特にこだわっていたことや、他の業者と違う点はありましたか？',
  '「他の業者と違う」というところ、もう少し詳しく聞かせてもらえますか？\nどんなところで差を感じますか？',
  '実際のお客様に伝えるとしたら、その違いをどう一言で表しますか？\n難しければ「うちが得意なのは○○」という形で教えてもらえると助かります。',
];

function App(){
  const [msgs,setMsgs]=useState(INIT_MESSAGES);
  const [input,setInput]=useState('');
  const [typing,setTyping]=useState(false);
  const [modal,setModal]=useState(false);
  const [replyIdx,setReplyIdx]=useState(0);
  const bottomRef=useRef(null);
  const textRef=useRef(null);

  useEffect(()=>{
    if(bottomRef.current) bottomRef.current.scrollTop=bottomRef.current.scrollHeight;
  },[msgs,typing]);

  const send=()=>{
    const t=input.trim();
    if(!t)return;
    setMsgs(m=>[...m,{side:'user',text:t}]);
    setInput('');
    setTyping(true);
    setTimeout(()=>{
      setTyping(false);
      const reply=AUTO_REPLIES[replyIdx%AUTO_REPLIES.length];
      setMsgs(m=>[...m,{side:'cast',text:reply}]);
      setReplyIdx(i=>i+1);
    },1800);
  };

  const onKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};

  const progress=Math.min(100,Math.round((msgs.filter(m=>m.side==='user').length/7)*100));

  return(
    <div className="interview-shell">
      {/* Header */}
      <div className="iv-header">
        <a href="Project.html" style={{fontSize:13,color:'var(--text3)',display:'flex',alignItems:'center',gap:4,textDecoration:'none',flexShrink:0}}>← 戻る</a>
        <div className="iv-cast-avt"><img src={CAST.img} alt={CAST.name}/></div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontFamily:'var(--serif)',fontSize:15,fontWeight:700,color:'var(--text)'}}>{CAST.name}</div>
          <div style={{fontSize:11,color:'var(--teal)',fontWeight:600}}>{CAST.role} · 田中建設株式会社</div>
        </div>
        <div className="iv-progress">
          <div className="iv-progress-label">
            <span>進捗</span>
            <span>{msgs.filter(m=>m.side==='user').length} / 7 回答</span>
          </div>
          <div className="progress-bar">
            <div className="progress-fill" style={{width:`${progress}%`}}/>
          </div>
        </div>
        <div style={{display:'flex',gap:8,marginLeft:16}}>
          <span className="badge badge-amber">Q {msgs.filter(m=>m.side==='cast').length}</span>
          <button className="btn btn-outline btn-sm" onClick={()=>setModal(true)}>取材を終了する</button>
        </div>
      </div>

      {/* Chat */}
      <div className="chat-area" ref={bottomRef}>
        {msgs.map((m,i)=>(
          <div key={i} className={`msg${m.side==='user'?' user':''}`}>
            {m.side==='cast'&&(
              <div className="msg-avt"><img src={CAST.img} alt={CAST.name}/></div>
            )}
            {m.side==='user'&&(
              <div className="msg-avt" style={{background:'var(--accent-l)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,color:'var(--accent)',fontSize:13}}>U</div>
            )}
            <div>
              <div className={`msg-bubble ${m.side}`} style={{whiteSpace:'pre-line'}}>{m.text}</div>
              <div className="msg-time">{m.side==='cast'?CAST.name:'あなた'} · たった今</div>
            </div>
          </div>
        ))}
        {typing&&(
          <div className="msg">
            <div className="msg-avt"><img src={CAST.img} alt={CAST.name}/></div>
            <div className="typing"><div className="typing-dot"/><div className="typing-dot"/><div className="typing-dot"/></div>
          </div>
        )}
      </div>

      {/* Input */}
      <div className="chat-input-bar">
        <textarea
          ref={textRef}
          className="chat-textarea"
          rows={1}
          placeholder="返答を入力… (Enter で送信 / Shift+Enter で改行)"
          value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={onKey}
        />
        <button className="send-btn" onClick={send} disabled={!input.trim()}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>

      {/* Finish modal */}
      {modal&&(
        <div className="finish-modal-bg" onClick={()=>setModal(false)}>
          <div className="finish-modal" onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:48,marginBottom:16}}>🎉</div>
            <h2 style={{fontFamily:'var(--serif)',fontSize:22,marginBottom:12}}>取材を終了しますか？</h2>
            <p style={{fontSize:14,color:'var(--text2)',lineHeight:1.8,marginBottom:24}}>取材内容をもとに取材メモと記事素材を生成します。</p>
            <div style={{display:'flex',gap:12,justifyContent:'center'}}>
              <button className="btn btn-outline" onClick={()=>setModal(false)}>続ける</button>
              <a className="btn btn-primary" href="Summary.html">終了して素材を生成する →</a>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
