<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記事一覧 — Insight Cast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../shared/components.jsx"></script>
<script type="text/babel">
const ARTICLES=[
  {title:'「ここに住み続けられる気がした」── 外壁塗装が届けた安心感の話',project:'田中建設株式会社',type:'ブログ記事',cast:'ミント',date:'2026.04.11',excerpt:'外壁塗装というと、見た目を新しくする工事というイメージが強いかもしれません。でも田中建設が大切にしているのは…'},
  {title:'プロが選ぶ理由がある：下地処理にこだわる田中建設の工法',project:'田中建設株式会社',type:'ブログ記事',cast:'クラウス',date:'2026.04.02',excerpt:'施工の質を左右するのは、仕上げではなく下地処理だ。手を抜けば数年で劣化が始まる。だから田中建設は…'},
  {title:'なぜ選ばれ続けるのか：田中建設が大切にしていること',project:'田中建設株式会社',type:'ブログ記事',cast:'レイン',date:'2026.03.30',excerpt:'口コミと紹介だけで仕事が続く業者がいる。それは、技術だけでなく「この人に頼みたい」という信頼が…'},
  {title:'外壁塗装の「あとのフォロー」が生む信頼',project:'田中建設株式会社',type:'インタビュー',cast:'ミント',date:'2026.04.12',excerpt:'工事が終わった後も連絡をくれる業者は少ない。田中建設代表が話す、アフターフォローへの考え方とは…'},
  {title:'整骨院で「また来たい」と思わせる空間づくり',project:'やまと整骨院',type:'ブログ記事',cast:'ミント',date:'2026.04.04',excerpt:'施術の技術だけでなく、来院した患者さんが「また来たい」と感じる空間をどう作るか…'},
  {title:'花束に込める「伝わる言葉」の話',project:'フローリスト花みどり',type:'インタビュー',cast:'ミント',date:'2026.03.22',excerpt:'フラワーショップのオーナーが語る、花を通じてメッセージを届けるコツとは…'},
];

function App(){
  const [filter,setFilter]=useState('すべて');
  const types=['すべて','ブログ記事','インタビュー'];
  const filtered=filter==='すべて'?ARTICLES:ARTICLES.filter(a=>a.type===filter);
  return(
    <AppShell active="記事一覧" title="記事一覧">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
        <div style={{display:'flex',gap:8}}>
          {types.map(t=>(
            <button key={t} onClick={()=>setFilter(t)} style={{padding:'6px 14px',borderRadius:100,fontSize:13,fontWeight:600,cursor:'pointer',border:'1.5px solid '+(filter===t?'var(--accent)':'var(--border)'),background:filter===t?'var(--accent)':'transparent',color:filter===t?'#fff':'var(--text2)',fontFamily:'var(--sans)',transition:'all .2s'}}>{t}</button>
          ))}
        </div>
        <span style={{fontSize:13,color:'var(--text3)'}}>{filtered.length}件</span>
      </div>
      <div className="table-wrap">
        <table className="data-table">
          <thead>
            <tr><th>タイトル</th><th>取材先</th><th>種類</th><th>担当</th><th>生成日</th><th></th></tr>
          </thead>
          <tbody>
            {filtered.map((a,i)=>(
              <tr key={i}>
                <td style={{maxWidth:320}}>
                  <div style={{fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:4}}>{a.title}</div>
                  <div style={{fontSize:12,color:'var(--text3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.excerpt}</div>
                </td>
                <td className="muted">{a.project}</td>
                <td><span className="badge badge-gray">{a.type}</span></td>
                <td className="muted">{a.cast}</td>
                <td className="muted">{a.date}</td>
                <td><div style={{display:'flex',gap:6}}><a className="btn btn-ghost btn-xs" href="Article.html">詳細</a><button className="btn btn-ghost btn-xs" onClick={()=>{}}>📋</button></div></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </AppShell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
