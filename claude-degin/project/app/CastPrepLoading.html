<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>取材準備中 — Insight Cast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fdf8f2 0%,#f0e5d0 100%);font-family:'Noto Sans JP',sans-serif;position:relative;overflow:hidden}

/* bg texture */
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 40%,rgba(194,114,42,.1) 0%,transparent 70%);pointer-events:none}

/* card */
.card{width:480px;background:var(--surface);border:1px solid var(--border);border-radius:28px;box-shadow:0 40px 100px rgba(0,0,0,.12);padding:48px 40px 44px;text-align:center;position:relative;z-index:1}

/* avatar with pulse rings */
.avatar-stage{width:128px;height:128px;margin:0 auto 28px;position:relative}
.ring{position:absolute;border-radius:50%;border:1.5px solid rgba(194,114,42,.18);animation:ripple 2.4s ease-out infinite}
.ring:nth-child(1){inset:-12px;animation-delay:0s}
.ring:nth-child(2){inset:-24px;animation-delay:.6s}
.ring:nth-child(3){inset:-36px;animation-delay:1.2s}
@keyframes ripple{0%{opacity:.7;transform:scale(.92)}100%{opacity:0;transform:scale(1)}}
.avatar-img{width:128px;height:128px;border-radius:50%;object-fit:cover;object-position:top;border:3px solid var(--accent);display:block;position:relative;z-index:1}

/* name / role */
.cast-name{font-family:'Noto Serif JP',serif;font-size:26px;font-weight:700;color:var(--text);margin-bottom:4px}
.cast-role-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;background:var(--accent-l);color:var(--accent);border-radius:100px;font-size:12px;font-weight:600;letter-spacing:.06em;border:1px solid rgba(194,114,42,.2);margin-bottom:28px}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.5}}

/* steps */
.steps{display:flex;flex-direction:column;gap:8px;margin-bottom:32px;text-align:left}
.step-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-radius:12px;font-size:13px;font-weight:500;transition:background .3s,color .3s}
.step-row.done{background:var(--ok-l);color:var(--ok)}
.step-row.active{background:var(--accent-l);color:var(--accent);font-weight:700}
.step-row.idle{background:var(--bg2);color:var(--text3)}
.step-ic{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;transition:all .3s}
.step-row.done .step-ic{background:var(--ok);color:#fff}
.step-row.active .step-ic{background:var(--accent);color:#fff}
.step-row.idle .step-ic{background:var(--border);color:var(--text3)}
.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* progress bar */
.prog-wrap{margin-bottom:12px}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:8px}
.prog-bar{height:5px;background:var(--bg2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#e8943a);border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* complete overlay */
.complete{position:absolute;inset:0;background:var(--surface);border-radius:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.complete-icon{font-size:60px;margin-bottom:18px;animation:popIn .45s cubic-bezier(.175,.885,.32,1.275)}
@keyframes popIn{0%{transform:scale(0)}100%{transform:scale(1)}}
.complete h2{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:10px}
.complete p{font-size:14px;color:var(--text2);line-height:1.8;margin-bottom:28px;max-width:320px;text-align:center}
.complete-actions{display:flex;gap:10px}
.btn-start{padding:13px 28px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-start:hover{background:var(--accent-h);transform:translateY(-1px)}
.btn-replay{padding:13px 18px;background:transparent;color:var(--text2);border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans JP';transition:all .2s}
.btn-replay:hover{border-color:var(--accent);color:var(--accent)}

/* demo switcher */
.switcher{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:6px 8px;display:flex;gap:4px;box-shadow:0 4px 20px rgba(0,0,0,.1);z-index:10}
.sw-btn{padding:7px 16px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;border:none;background:transparent;color:var(--text2);font-family:'Noto Sans JP'}
.sw-btn:hover{color:var(--text)}
.sw-btn.active{background:var(--accent);color:#fff}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

const CASTS={
  mint:{name:'ミント',role:'Story Listener',img:'../uploads/portrait-half-e56f0f59.png',
    steps:['HP調査レポートを読み込んでいます','お客様目線のテーマを分析中','ミントが質問リストを作成しています','取材の準備が整いました'],
    ready:'田中建設さんのエピソードを引き出す準備ができました。'},
  claus:{name:'クラウス',role:'Industry Editor',img:'../uploads/portrait-half.png',
    steps:['HP調査レポートを読み込んでいます','業種の専門知識を確認しています','技術的な質問リストを作成中','取材の準備が整いました'],
    ready:'専門性・こだわりを掘り下げる準備ができました。'},
  rain:{name:'レイン',role:'Message Strategist',img:'../uploads/portrait-half-c748dc68.png',
    steps:['HP調査レポートを読み込んでいます','競合サイトとの比較を整理中','メッセージ戦略の質問を準備しています','取材の準備が整いました'],
    ready:'差別化・選ばれる理由を言語化する準備ができました。'},
};

function PrepScreen({castId,onReplay}){
  const cast=CASTS[castId];
  const [tick,setTick]=useState(0);
  const done=tick>=cast.steps.length;
  const pct=Math.round((tick/cast.steps.length)*100);

  useEffect(()=>{
    setTick(0);
  },[castId]);

  useEffect(()=>{
    if(done){setTimeout(()=>window.location.href='Interview.html',400);return;}
    const t=setTimeout(()=>setTick(i=>i+1),tick===0?500:950);
    return()=>clearTimeout(t);
  },[tick,done,castId]);

  return(
    <div className="card">
      {/* Avatar */}
      <div className="avatar-stage">
        <div className="ring"/><div className="ring"/><div className="ring"/>
        <img className="avatar-img" src={cast.img} alt={cast.name}/>
      </div>

      <div className="cast-name">{cast.name}</div>
      <div className="cast-role-badge"><div className="ai-dot"/>{cast.role} · 準備中</div>

      {/* Progress */}
      <div className="prog-wrap">
        <div className="prog-label">
          <span>取材準備</span>
          <span style={{fontWeight:600,color:'var(--accent)'}}>{pct}%</span>
        </div>
        <div className="prog-bar">
          <div className="prog-fill" style={{width:`${pct}%`}}/>
        </div>
      </div>

      {/* Steps */}
      <div className="steps">
        {cast.steps.map((s,i)=>{
          const state=i<tick?'done':i===tick?'active':'idle';
          return(
            <div key={i} className={`step-row ${state}`}>
              <div className="step-ic">
                {state==='done'?'✓':state==='active'?<span className="spin">◌</span>:i+1}
              </div>
              {s}
            </div>
          );
        })}
      </div>

      {/* Transition overlay */}
      {done&&(
        <div className="complete">
          <div className="complete-icon" style={{fontSize:48,marginBottom:12}}>🎤</div>
          <h2 style={{fontSize:18}}>取材を開始しています…</h2>
        </div>
      )}
    </div>
  );
}

function App(){
  const [castId,setCastId]=useState('mint');
  const [key,setKey]=useState(0);
  const replay=()=>setKey(k=>k+1);
  const switchCast=id=>{setCastId(id);setKey(k=>k+1);};

  return(
    <>
      <PrepScreen key={`${castId}-${key}`} castId={castId} onReplay={replay}/>
      {/* Demo switcher */}
      <div className="switcher">
        {Object.entries(CASTS).map(([id,c])=>(
          <button key={id} className={`sw-btn${castId===id?' active':''}`} onClick={()=>switchCast(id)}>
            {c.name}
          </button>
        ))}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
