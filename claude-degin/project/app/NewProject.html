<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>取材先登録 — Insight Cast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
.new-proj-layout{max-width:680px}
.speech-panel{display:flex;gap:16px;align-items:flex-start;background:var(--accent-l);border:1px solid rgba(194,114,42,.2);border-radius:var(--r-lg);padding:20px;margin-bottom:28px}
.speech-cast{width:48px;height:48px;border-radius:50%;overflow:hidden;border:2px solid var(--accent);flex-shrink:0}
.speech-cast img{width:100%;height:100%;object-fit:cover;object-position:top}
.speech-text{font-size:14px;color:var(--text);line-height:1.8}
.speech-name{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:5px}
.competitor-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.step-indicator{display:flex;gap:8px;margin-bottom:32px}
.step-dot-lg{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.step-dot-lg.done{background:var(--teal);color:#fff}
.step-dot-lg.active{background:var(--accent);color:#fff}
.step-dot-lg.idle{background:var(--bg2);color:var(--text3);border:1.5px solid var(--border)}
.step-connector-lg{flex:1;height:1px;background:var(--border);margin-top:13px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../shared/components.jsx"></script>
<script type="text/babel">
const {useState}=React;
function App(){
  const [step,setStep]=useState(1); // 1=基本情報 2=競合 3=完了
  const [name,setName]=useState('');
  const [url,setUrl]=useState('');
  const [industry,setIndustry]=useState('');
  const [location,setLocation]=useState('');
  const [competitors,setCompetitors]=useState(['','']);
  const [analyzing,setAnalyzing]=useState(false);
  const [analyzed,setAnalyzed]=useState(false);

  const analyze=()=>{
    if(!url)return;
    setAnalyzing(true);
    setTimeout(()=>{setAnalyzing(false);setAnalyzed(true);},2000);
  };

  const submit1=e=>{e.preventDefault();if(!name||!url)return;setStep(2)};
  const submit2=e=>{e.preventDefault();setStep(3)};

  const addComp=()=>setCompetitors(c=>[...c,'']);
  const removeComp=i=>setCompetitors(c=>c.filter((_,idx)=>idx!==i));
  const setComp=(i,v)=>setCompetitors(c=>c.map((x,idx)=>idx===i?v:x));

  return(
    <AppShell active="取材先一覧" title="取材先を登録" headerRight={
      <a className="btn btn-outline btn-sm" href="Projects.html">キャンセル</a>
    }>
      {/* Step indicator */}
      <div style={{display:'flex',alignItems:'center',gap:8,maxWidth:480,marginBottom:32}}>
        {['基本情報','競合URL','完了'].map((s,i)=>(
          <React.Fragment key={s}>
            <div className={`step-dot-lg ${step>i+1?'done':step===i+1?'active':'idle'}`}>{step>i+1?'✓':i+1}</div>
            <div style={{flex:1,fontSize:13,color:step===i+1?'var(--accent)':step>i+1?'var(--teal)':'var(--text3)',fontWeight:step===i+1||step>i+1?600:400}}>{s}</div>
            {i<2&&<div style={{width:32,height:1,background:'var(--border)',flexShrink:0}}/>}
          </React.Fragment>
        ))}
      </div>

      <div className="new-proj-layout">
        {/* Guide speech */}
        <div className="speech-panel">
          <div className="speech-cast"><img src="../uploads/portrait-half-e56f0f59.png" alt="ミント"/></div>
          <div>
            <div className="speech-name">ミント</div>
            <div className="speech-text">
              {step===1&&'取材先の基本情報を教えてください。URLを入れると、AIが現状のホームページを分析してテーマを提案してくれます。'}
              {step===2&&'競合サイトのURLを入れると、比較分析ができます。分からない場合はスキップしても大丈夫です。'}
              {step===3&&'登録完了です！さっそく取材を始めましょう。'}
            </div>
          </div>
        </div>

        {step===1&&(
          <form onSubmit={submit1} style={{display:'flex',flexDirection:'column',gap:20}}>
            <div className="settings-section" style={{padding:28}}>
              <h2 style={{fontFamily:'var(--serif)',fontSize:18,fontWeight:700,marginBottom:20}}>基本情報</h2>
              <div style={{display:'flex',flexDirection:'column',gap:16}}>
                <div className="form-group">
                  <label className="form-label">取材先の名前<span className="req">*</span></label>
                  <input className="input" placeholder="例：田中建設株式会社" value={name} onChange={e=>setName(e.target.value)}/>
                </div>
                <div className="form-group">
                  <label className="form-label">ホームページURL<span className="req">*</span></label>
                  <div style={{display:'flex',gap:8}}>
                    <input className="input" placeholder="https://example.com" value={url} onChange={e=>setUrl(e.target.value)} style={{flex:1}}/>
                    <button type="button" className="btn btn-outline btn-sm" onClick={analyze} disabled={!url||analyzing} style={{flexShrink:0}}>
                      {analyzing?'分析中…':analyzed?'✓ 分析済み':'HP分析'}
                    </button>
                  </div>
                  {analyzing&&<div style={{fontSize:12,color:'var(--accent)',marginTop:6}}>AIがホームページを分析しています…</div>}
                  {analyzed&&<div style={{fontSize:12,color:'var(--teal)',marginTop:6}}>✓ 分析完了。競合サイトの候補を提案します。</div>}
                </div>
                <div className="form-group">
                  <label className="form-label">業種・メモ</label>
                  <input className="input" placeholder="例：外壁塗装・リフォーム業" value={industry} onChange={e=>setIndustry(e.target.value)}/>
                </div>
                <div className="form-group">
                  <label className="form-label">所在地</label>
                  <input className="input" placeholder="例：東京都渋谷区" value={location} onChange={e=>setLocation(e.target.value)}/>
                </div>
              </div>
            </div>
            <div style={{display:'flex',gap:12}}>
              <button type="submit" className="btn btn-primary" disabled={!name||!url}>次へ：競合URLを入力 →</button>
              <a href="Projects.html" className="btn btn-ghost">キャンセル</a>
            </div>
          </form>
        )}

        {step===2&&(
          <form onSubmit={submit2} style={{display:'flex',flexDirection:'column',gap:20}}>
            <div className="settings-section" style={{padding:28}}>
              <h2 style={{fontFamily:'var(--serif)',fontSize:18,fontWeight:700,marginBottom:6}}>競合URL（任意）</h2>
              <div style={{fontSize:13,color:'var(--text3)',marginBottom:20}}>競合サイトを登録すると、比較分析がより詳しくなります。最大3社まで。</div>
              {analyzed&&(
                <div style={{background:'var(--teal-l)',border:'1px solid var(--teal)',borderRadius:10,padding:14,marginBottom:16}}>
                  <div style={{fontSize:12,fontWeight:700,color:'var(--teal)',marginBottom:8}}>✦ 候補として提案された競合サイト</div>
                  {['competitor-a.example.jp','competitor-b.example.jp'].map((c,i)=>(
                    <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',fontSize:13,color:'var(--text)',padding:'5px 0'}}>
                      <span>🔗 {c}</span>
                      <button type="button" className="btn btn-xs btn-outline" onClick={()=>setComp(i,`https://${c}`)}>追加</button>
                    </div>
                  ))}
                </div>
              )}
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {competitors.map((c,i)=>(
                  <div key={i} className="competitor-row">
                    <input className="input" placeholder={`競合URL ${i+1}`} value={c} onChange={e=>setComp(i,e.target.value)} style={{flex:1}}/>
                    {competitors.length>1&&<button type="button" className="btn btn-ghost btn-xs" onClick={()=>removeComp(i)}>✕</button>}
                  </div>
                ))}
              </div>
              {competitors.length<3&&(
                <button type="button" className="btn btn-ghost btn-sm" onClick={addComp} style={{marginTop:8}}>+ URLを追加</button>
              )}
            </div>
            <div style={{display:'flex',gap:12}}>
              <button type="submit" className="btn btn-primary">登録して分析を開始する →</button>
              <button type="button" className="btn btn-ghost" onClick={()=>setStep(3)}>スキップ</button>
              <button type="button" className="btn btn-ghost" onClick={()=>setStep(1)}>← 戻る</button>
            </div>
          </form>
        )}

        {step===3&&(
          <div style={{textAlign:'center',padding:'40px 0'}}>
            <div style={{fontSize:64,marginBottom:20}}>🎉</div>
            <h2 style={{fontFamily:'var(--serif)',fontSize:24,fontWeight:700,marginBottom:12}}>{name}を登録しました</h2>
            <p style={{fontSize:15,color:'var(--text2)',lineHeight:1.8,marginBottom:32,maxWidth:400,margin:'0 auto 32px'}}>HPの分析が完了したら、さっそく取材を始めましょう。</p>
            <div style={{display:'flex',gap:12,justifyContent:'center'}}>
              <a className="btn btn-primary btn-lg" href="Interview.html">さっそく取材を始める →</a>
              <a className="btn btn-outline" href="Projects.html">取材先一覧へ</a>
            </div>
          </div>
        )}
      </div>
    </AppShell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
