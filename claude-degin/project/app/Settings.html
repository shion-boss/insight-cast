<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設定 — Insight Cast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
.settings-layout{display:grid;grid-template-columns:200px 1fr;gap:32px;align-items:start}
.settings-nav{position:sticky;top:80px;display:flex;flex-direction:column;gap:2px}
.settings-nav-link{padding:9px 12px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;border-left:2px solid transparent}
.settings-nav-link:hover{color:var(--text);background:var(--bg2)}
.settings-nav-link.active{color:var(--accent);background:var(--accent-l);border-left-color:var(--accent)}
.settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px;margin-bottom:20px}
.settings-section h2{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
.settings-section .desc{font-size:13px;color:var(--text3);margin-bottom:24px}
.plan-current{background:var(--accent-l);border:1px solid rgba(194,114,42,.25);border-radius:12px;padding:20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.plan-name{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--accent)}
.usage-bar-wrap{margin-top:16px}
.usage-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px}
.danger-zone{border:1.5px solid var(--err-l);border-radius:12px;padding:20px}
.danger-zone h3{font-size:15px;font-weight:700;color:var(--err);margin-bottom:6px}
.danger-zone p{font-size:13px;color:var(--text2);margin-bottom:14px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../shared/components.jsx"></script>
<script type="text/babel">
const {useState}=React;
function App(){
  const [name,setName]=useState('山田 太郎');
  const [email]=useState('yamada@example.com');
  const [saved,setSaved]=useState(false);
  const [activeSection,setActiveSection]=useState('アカウント');
  const sections=['アカウント','プラン・請求','通知','セキュリティ'];

  const save=()=>{setSaved(true);setTimeout(()=>setSaved(false),2000)};

  return(
    <AppShell active="設定" title="設定">
      <div className="settings-layout">
        <div className="settings-nav">
          {sections.map(s=>(
            <div key={s} className={`settings-nav-link${activeSection===s?' active':''}`} onClick={()=>setActiveSection(s)}>{s}</div>
          ))}
        </div>

        <div>
          {activeSection==='アカウント'&&(
            <>
              <div className="settings-section">
                <h2>アカウント情報</h2>
                <div className="desc">登録名とメールアドレスを管理します</div>
                {/* Avatar */}
                <div style={{display:'flex',alignItems:'center',gap:20,marginBottom:24,padding:'16px 0',borderBottom:'1px solid var(--border)'}}>
                  <div style={{width:64,height:64,borderRadius:'50%',background:'var(--accent-l)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--serif)',fontSize:24,fontWeight:700,color:'var(--accent)',border:'2px solid var(--border)'}}>山</div>
                  <div>
                    <div style={{fontSize:15,fontWeight:700,color:'var(--text)',marginBottom:4}}>山田 太郎</div>
                    <button className="btn btn-outline btn-xs">アイコンを変更</button>
                  </div>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:16}}>
                  <div className="form-group">
                    <label className="form-label">表示名</label>
                    <input className="input" value={name} onChange={e=>setName(e.target.value)}/>
                  </div>
                  <div className="form-group">
                    <label className="form-label">メールアドレス</label>
                    <input className="input" value={email} disabled style={{opacity:.6}}/>
                    <span className="form-hint">メールアドレスの変更はサポートにお問い合わせください</span>
                  </div>
                </div>
                <div style={{marginTop:20,display:'flex',alignItems:'center',gap:12}}>
                  <button className="btn btn-primary btn-sm" onClick={save}>変更を保存する</button>
                  {saved&&<span style={{fontSize:13,color:'var(--teal)',fontWeight:600}}>✓ 保存しました</span>}
                </div>
              </div>
              <div className="settings-section">
                <h2>アカウントを削除</h2>
                <div className="desc">取り消せない操作です</div>
                <div className="danger-zone">
                  <h3>アカウントを削除する</h3>
                  <p>すべての取材先・取材メモ・記事素材が完全に削除されます。この操作は取り消せません。削除前にデータをエクスポートしてください。</p>
                  <button className="btn btn-danger btn-sm">アカウントを削除する</button>
                </div>
              </div>
            </>
          )}

          {activeSection==='プラン・請求'&&(
            <div className="settings-section">
              <h2>現在のプラン</h2>
              <div className="desc">プランの確認・変更ができます</div>
              <div className="plan-current">
                <div>
                  <div style={{fontSize:12,color:'var(--accent)',fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:4}}>現在のプラン</div>
                  <div className="plan-name">Free</div>
                </div>
                <a className="btn btn-primary btn-sm" href="../Pricing.html">アップグレード →</a>
              </div>
              <div className="usage-bar-wrap">
                <div className="usage-label"><span>今月の取材使用数</span><span style={{fontWeight:600}}>1 / 2 回</span></div>
                <div className="progress-bar"><div className="progress-fill" style={{width:'50%'}}/></div>
              </div>
              <div style={{marginTop:20,padding:'16px',background:'var(--bg2)',borderRadius:10}}>
                <div style={{fontSize:13,fontWeight:600,color:'var(--text)',marginBottom:8}}>Standardにアップグレードで</div>
                {['月10回の取材','詳細HP分析レポート','記事素材 月10本'].map(f=>(
                  <div key={f} style={{fontSize:13,color:'var(--text2)',padding:'4px 0',display:'flex',gap:8,alignItems:'center'}}>
                    <span style={{color:'var(--teal)',fontWeight:700}}>✓</span>{f}
                  </div>
                ))}
                <a className="btn btn-primary btn-sm" href="../Pricing.html" style={{marginTop:12,display:'inline-flex'}}>プランを見る →</a>
              </div>
            </div>
          )}

          {activeSection==='通知'&&(
            <div className="settings-section">
              <h2>通知設定</h2>
              <div className="desc">メール通知の受信設定を管理します</div>
              {[
                {l:'取材完了の通知',d:'AIキャストによる取材が完了したときにメールを受け取る',on:true},
                {l:'記事素材生成完了',d:'記事素材が生成されたときにメールを受け取る',on:true},
                {l:'月次利用レポート',d:'月末に利用状況のサマリーを受け取る',on:false},
                {l:'サービスのお知らせ',d:'新機能・キャスト追加などのお知らせを受け取る',on:true},
              ].map((n,i)=>{
                const [on,setOn]=useState(n.on);
                return(
                  <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 0',borderBottom:'1px solid var(--border)'}}>
                    <div>
                      <div style={{fontSize:14,fontWeight:600,color:'var(--text)',marginBottom:3}}>{n.l}</div>
                      <div style={{fontSize:12,color:'var(--text3)'}}>{n.d}</div>
                    </div>
                    <div onClick={()=>setOn(!on)} style={{width:44,height:24,borderRadius:12,background:on?'var(--accent)':'var(--border)',cursor:'pointer',position:'relative',transition:'background .2s',flexShrink:0}}>
                      <div style={{width:18,height:18,borderRadius:'50%',background:'#fff',position:'absolute',top:3,left:on?23:3,transition:'left .2s',boxShadow:'0 1px 4px rgba(0,0,0,.2)'}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {activeSection==='セキュリティ'&&(
            <div className="settings-section">
              <h2>セキュリティ</h2>
              <div className="desc">パスワードとログインセッションを管理します</div>
              <div style={{display:'flex',flexDirection:'column',gap:16}}>
                <div className="form-group">
                  <label className="form-label">現在のパスワード</label>
                  <input className="input" type="password" placeholder="••••••••"/>
                </div>
                <div className="form-group">
                  <label className="form-label">新しいパスワード</label>
                  <input className="input" type="password" placeholder="8文字以上"/>
                </div>
                <div className="form-group">
                  <label className="form-label">新しいパスワード（確認）</label>
                  <input className="input" type="password" placeholder="もう一度入力"/>
                </div>
                <button className="btn btn-primary btn-sm" style={{width:'fit-content'}}>パスワードを変更する</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </AppShell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
