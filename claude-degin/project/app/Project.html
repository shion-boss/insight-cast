<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>取材先管理 — Insight Cast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
.overview-panel{background:linear-gradient(135deg,var(--accent-l),var(--teal-l));border:1px solid var(--border);border-radius:var(--r-lg);padding:28px;margin-bottom:28px}
.iv-row{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;margin:0 -20px;padding-left:20px;padding-right:20px;border-radius:0}
.iv-row:last-child{border-bottom:none}
.iv-row:hover{background:var(--bg)}
.iv-cast-img{width:38px;height:38px;border-radius:50%;overflow:hidden;border:1.5px solid var(--border);flex-shrink:0}
.iv-cast-img img{width:100%;height:100%;object-fit:cover;object-position:top}
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:28px}
.tab{padding:10px 20px;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.report-row{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
.report-row:last-child{border-bottom:none}
.report-label{font-size:11px;background:var(--accent-l);color:var(--accent);padding:3px 10px;border-radius:100px;font-weight:600;white-space:nowrap;flex-shrink:0;margin-top:1px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../shared/components.jsx"></script>
<script type="text/babel">
const {useState}=React;
const INTERVIEWS=[
  {cast:'ミント',img:'../uploads/portrait-half-e56f0f59.png',date:'2026.04.10',status:'badge-ok',statusL:'完了',themes:['お客様エピソード','接客の心がけ'],articles:2},
  {cast:'クラウス',img:'../uploads/portrait-half.png',date:'2026.03.28',status:'badge-ok',statusL:'完了',themes:['下地処理へのこだわり','使用材料の違い'],articles:1},
  {cast:'レイン',img:'../uploads/portrait-half-c748dc68.png',date:'2026.03.15',status:'badge-ok',statusL:'完了',themes:['選ばれる理由','競合との差'],articles:1},
  {cast:'ミント',img:'../uploads/portrait-half-e56f0f59.png',date:'2026.02.20',status:'badge-warn',statusL:'途中',themes:[],articles:0},
];
const ARTICLES=[
  {title:'「ここに住み続けられる気がした」── 外壁塗装が届けた安心感の話',type:'ブログ',date:'2026.04.11',cast:'ミント'},
  {title:'プロが選ぶ理由がある：下地処理にこだわる田中建設の工法',type:'ブログ',date:'2026.04.02',cast:'クラウス'},
  {title:'なぜ選ばれ続けるのか：田中建設が大切にしていること',type:'ブログ',date:'2026.03.30',cast:'レイン'},
  {title:'外壁塗装の「あとのフォロー」が生む信頼',type:'インタビュー',date:'2026.04.12',cast:'ミント'},
];

function App(){
  const [tab,setTab]=useState('取材');
  return(
    <AppShell active="取材先一覧" title="田中建設株式会社" headerRight={
      <div className="flex gap-3">
        <a className="btn btn-outline btn-sm" href="Projects.html">← 一覧へ戻る</a>
        <a className="btn btn-primary btn-sm" href="Interview.html">+ 取材する</a>
      </div>
    }>
      <div className="breadcrumb">
        <a href="Projects.html">取材先一覧</a>
        <span className="breadcrumb-sep">/</span>
        <span>田中建設株式会社</span>
      </div>

      {/* Overview */}
      <div className="overview-panel">
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:24}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
              <div style={{fontSize:32}}>🏗</div>
              <div>
                <div style={{fontFamily:'var(--serif)',fontSize:22,fontWeight:700,color:'var(--text)'}}>田中建設株式会社</div>
                <div style={{fontSize:13,color:'var(--text2)'}}>🔗 tanaka-kensetsu.example.jp</div>
              </div>
            </div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              <span className="badge badge-ok">取材済み</span>
              <span className="badge badge-gray">建設業</span>
              <span className="badge badge-gray">東京都</span>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
            {[{n:4,l:'取材回数'},{n:4,l:'記事素材'},{n:'2026.04.10',l:'最終取材'}].map(s=>(
              <div key={s.l} style={{background:'rgba(255,255,255,.6)',borderRadius:10,padding:'12px 16px',textAlign:'center'}}>
                <div style={{fontFamily:'var(--serif)',fontSize:s.n.toString().length>4?14:22,fontWeight:700,color:'var(--text)'}}>{s.n}</div>
                <div style={{fontSize:11,color:'var(--text2)',marginTop:4}}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div className="tab-bar">
        {['取材','記事素材','調査レポート'].map(t=>(
          <div key={t} className={`tab${tab===t?' active':''}`} onClick={()=>setTab(t)}>{t}</div>
        ))}
      </div>

      {tab==='取材'&&(
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <h3 style={{fontFamily:'var(--serif)',fontSize:16,fontWeight:700}}>取材履歴</h3>
            <a className="btn btn-primary btn-sm" href="Interview.html">+ 新しく取材する</a>
          </div>
          <div className="card" style={{padding:'0 20px'}}>
            {INTERVIEWS.map((iv,i)=>(
              <div key={i} className="iv-row" onClick={()=>window.location.href='Summary.html'}>
                <div className="iv-cast-img"><img src={iv.img} alt={iv.cast}/></div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:600,color:'var(--text)',marginBottom:3}}>{iv.cast} · {iv.date}</div>
                  <div style={{fontSize:12,color:'var(--text3)'}}>
                    {iv.themes.length>0?iv.themes.join('、'):'テーマ未確定'}
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  {iv.articles>0&&<span style={{fontSize:11,color:'var(--text3)'}}>記事 {iv.articles}本</span>}
                  <span className={`badge ${iv.status}`}>{iv.statusL}</span>
                  {iv.statusL==='完了'&&<a className="btn btn-outline btn-xs" href="Summary.html">メモを見る</a>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==='記事素材'&&(
        <div>
          <div className="table-wrap">
            <table className="data-table">
              <thead><tr><th>タイトル</th><th>種類</th><th>担当キャスト</th><th>生成日</th><th></th></tr></thead>
              <tbody>
                {ARTICLES.map((a,i)=>(
                  <tr key={i}>
                    <td style={{fontWeight:600,maxWidth:320}}><div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.title}</div></td>
                    <td><span className="badge badge-gray">{a.type}</span></td>
                    <td className="muted">{a.cast}</td>
                    <td className="muted">{a.date}</td>
                    <td><a className="btn btn-ghost btn-xs" href="ArticleDetail.html">詳細</a></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {tab==='調査レポート'&&(
        <div className="card">
          <div style={{marginBottom:20}}>
            <div className="label">現状評価</div>
            <div style={{marginTop:12,display:'flex',flexDirection:'column',gap:8}}>
              {[
                {l:'情報の鮮度',v:'施工実績が2022年で止まっている'},
                {l:'訴求の強さ',v:'価格訴求のみ。こだわりや人柄が未掲載'},
                {l:'競合との差',v:'下地処理のこだわりが未掲載（競合との最大の差別点）'},
              ].map(r=>(
                <div key={r.l} className="report-row">
                  <span className="report-label">{r.l}</span>
                  <span style={{fontSize:14,color:'var(--text)'}}>{r.v}</span>
                </div>
              ))}
            </div>
          </div>
          <hr className="divider" style={{margin:'20px 0'}}/>
          <div>
            <div className="label">取材テーマ提案</div>
            <div style={{marginTop:12,display:'flex',gap:8,flexWrap:'wrap'}}>
              {['職人のこだわり','お客様エピソード','施工事例の詳細','選ばれる理由','スタッフ紹介'].map(t=>(
                <span key={t} className="badge badge-amber">{t}</span>
              ))}
            </div>
          </div>
        </div>
      )}
    </AppShell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
