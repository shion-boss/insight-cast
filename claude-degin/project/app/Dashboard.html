<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダッシュボード — Insight Cast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px}
.stat-n{font-family:var(--serif);font-size:32px;font-weight:700;color:var(--text);line-height:1}
.stat-l{font-size:13px;color:var(--text2);margin-top:5px}
.stat-delta{font-size:12px;color:var(--teal);margin-top:3px;font-weight:600}

/* ── ANALYTICS ROW ── */
.analytics-row{display:grid;grid-template-columns:340px 1fr;gap:20px;margin-bottom:24px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px}
.chart-title{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
.chart-sub{font-size:12px;color:var(--text3);margin-bottom:18px}

/* ── DONUT ── */
.donut-wrap{display:flex;align-items:center;gap:24px}
.donut-legend{display:flex;flex-direction:column;gap:8px;flex:1}
.legend-row{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--text2);cursor:default}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.legend-val{font-weight:700;color:var(--text);font-size:13px}
.legend-pct{color:var(--text3);font-size:11px}

/* ── UPDATE HEATMAP ── */
.heatmap-wrap{overflow-x:auto}
.hm-month-labels{display:flex;gap:0;padding-left:28px;margin-bottom:4px}
.hm-month-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.06em}
.hm-grid{display:flex;gap:3px}
.hm-col{display:flex;flex-direction:column;gap:3px;align-items:center}
.hm-day-label{font-size:10px;color:var(--text3);height:12px;display:flex;align-items:center;width:22px;text-align:right;justify-content:flex-end;flex-shrink:0}
.hm-cell{width:14px;height:14px;border-radius:3px;flex-shrink:0;cursor:pointer;transition:transform .15s}
.hm-cell:hover{transform:scale(1.3)}

/* ── UPDATE SCORE ── */
.score-row{display:flex;align-items:center;gap:20px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.score-ring{position:relative;width:64px;height:64px;flex-shrink:0}
.score-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:18px;font-weight:700;color:var(--accent)}
.score-meta{flex:1}
.score-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.score-desc{font-size:12px;color:var(--text2);line-height:1.6}

/* ── QUICK ACTIONS ── */
.quick-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.qa-btn{background:var(--surface);border:1.5px dashed var(--border);border-radius:var(--r-lg);padding:18px;display:flex;flex-direction:column;align-items:center;gap:9px;cursor:pointer;transition:all .2s;text-decoration:none}
.qa-btn:hover{border-color:var(--accent);background:var(--accent-l)}
.qa-label{font-size:13px;font-weight:600;color:var(--text2)}

/* ── BOTTOM GRID ── */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-head h2{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--text)}
.project-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:box-shadow .2s;text-decoration:none}
.project-card:hover{box-shadow:0 4px 20px var(--shadow)}
.project-icon{width:42px;height:42px;border-radius:10px;background:var(--accent-l);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.interview-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.interview-row:last-child{border-bottom:none}
.cast-dot{width:30px;height:30px;border-radius:50%;overflow:hidden;flex-shrink:0;border:1.5px solid var(--border)}
.cast-dot img{width:100%;height:100%;object-fit:cover;object-position:top}

/* ── TOOLTIP ── */
.tooltip{position:fixed;background:var(--text);color:#fff;font-size:11px;padding:5px 10px;border-radius:6px;pointer-events:none;z-index:999;white-space:nowrap;transform:translate(-50%,-130%)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../shared/components.jsx"></script>
<script type="text/babel">
const {useState,useRef,useEffect}=React;

/* ═══════════════════════════════
   DATA
═══════════════════════════════ */
const PROJECTS=[
  {name:'田中建設株式会社',icon:'🏗',sub:'最終取材: 2日前',status:'badge-ok',statusL:'取材済み'},
  {name:'やまと整骨院',icon:'🏥',sub:'最終取材: 1週間前',status:'badge-warn',statusL:'分析中'},
  {name:'フローリスト花みどり',icon:'🌸',sub:'最終取材: 2週間前',status:'badge-gray',statusL:'下書き'},
  {name:'カフェ・プリムラ',icon:'☕',sub:'最終取材: 1ヶ月前',status:'badge-gray',statusL:'未取材'},
];
const INTERVIEWS=[
  {cast:'ミント',img:'../uploads/portrait-half-e56f0f59.png',project:'田中建設株式会社',date:'2026.04.10',status:'badge-ok',statusL:'完了'},
  {cast:'クラウス',img:'../uploads/portrait-half.png',project:'やまと整骨院',date:'2026.04.03',status:'badge-ok',statusL:'完了'},
  {cast:'レイン',img:'../uploads/portrait-half-c748dc68.png',project:'田中建設株式会社',date:'2026.03.28',status:'badge-ok',statusL:'完了'},
  {cast:'ミント',img:'../uploads/portrait-half-e56f0f59.png',project:'フローリスト花みどり',date:'2026.03.20',status:'badge-warn',statusL:'途中'},
];

// テーマ分布
const THEME_DATA=[
  {label:'専門技術・こだわり',count:4,color:'#c2722a'},
  {label:'お客様エピソード',count:3,color:'#0d9488'},
  {label:'選ばれる理由・差別化',count:3,color:'#7c3aed'},
  {label:'スタッフ・人柄',count:2,color:'#d97706'},
  {label:'施工事例・実績',count:1,color:'#16a34a'},
];

// 更新カレンダー（過去24週 × 7日）
function buildHeatmap(){
  const today=new Date(2026,3,20); // Apr 20
  const cells=[];
  // 24週 = 168日前から
  const start=new Date(today);
  start.setDate(start.getDate()-167);
  // 最初の日曜まで調整
  const startDay=start.getDay();
  start.setDate(start.getDate()-startDay);
  for(let w=0;w<25;w++){
    const col=[];
    for(let d=0;d<7;d++){
      const dt=new Date(start);
      dt.setDate(start.getDate()+w*7+d);
      if(dt>today){col.push(null);continue;}
      // 擬似データ: 特定週に記事あり
      const wk=w;
      let count=0;
      if([3,7,10,14,17,20,22].includes(wk)&&d===2) count=2;
      else if([5,11,15,19,23].includes(wk)&&d===4) count=1;
      else if([8,16,21].includes(wk)&&[1,3].includes(d)) count=1;
      col.push({date:dt,count,label:`${dt.getMonth()+1}/${dt.getDate()}`});
    }
    cells.push(col);
  }
  return cells;
}
const HEATMAP=buildHeatmap();

// 月次記事数（過去6ヶ月）
const MONTHLY=[
  {m:'11月',n:0},{m:'12月',n:1},{m:'1月',n:0},{m:'2月',n:2},{m:'3月',n:3},{m:'4月',n:2},
];

/* ═══════════════════════════════
   DONUT CHART
═══════════════════════════════ */
function DonutChart({data}){
  const [hovered,setHovered]=useState(null);
  const total=data.reduce((s,d)=>s+d.count,0);
  const R=60,cx=70,cy=70,stroke=22;
  const circ=2*Math.PI*R;

  let offset=0;
  const slices=data.map((d,i)=>{
    const pct=d.count/total;
    const dash=pct*circ;
    const slice={...d,dash,offset,pct};
    offset+=dash;
    return slice;
  });

  const active=hovered!==null?data[hovered]:null;

  return(
    <div className="donut-wrap">
      <div style={{position:'relative',flexShrink:0}}>
        <svg width={140} height={140}>
          {/* track */}
          <circle cx={cx} cy={cy} r={R} fill="none" stroke="var(--bg2)" strokeWidth={stroke}/>
          {slices.map((s,i)=>(
            <circle key={i} cx={cx} cy={cy} r={R} fill="none"
              stroke={s.color}
              strokeWidth={hovered===i?stroke+4:stroke}
              strokeDasharray={`${s.dash} ${circ-s.dash}`}
              strokeDashoffset={circ/4-s.offset}
              style={{cursor:'pointer',transition:'stroke-width .15s',transformOrigin:`${cx}px ${cy}px`}}
              onMouseEnter={()=>setHovered(i)}
              onMouseLeave={()=>setHovered(null)}
            />
          ))}
          {/* center */}
          <text x={cx} y={cy-8} textAnchor="middle" style={{fontFamily:'Noto Serif JP',fontSize:22,fontWeight:700,fill:'var(--text)'}}>
            {active?active.count:total}
          </text>
          <text x={cx} y={cy+10} textAnchor="middle" style={{fontFamily:'Noto Sans JP',fontSize:10,fill:'var(--text3)'}}>
            {active?'件':'記事合計'}
          </text>
        </svg>
      </div>
      <div className="donut-legend">
        {data.map((d,i)=>(
          <div key={i} className="legend-row"
            onMouseEnter={()=>setHovered(i)}
            onMouseLeave={()=>setHovered(null)}
            style={{opacity:hovered!==null&&hovered!==i?.45:1,transition:'opacity .15s'}}>
            <div className="legend-dot" style={{background:d.color}}/>
            <span className="legend-label">{d.label}</span>
            <span className="legend-val">{d.count}</span>
            <span className="legend-pct">{Math.round(d.count/total*100)}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════
   BAR CHART (月次更新)
═══════════════════════════════ */
function BarChart({data}){
  const [hov,setHov]=useState(null);
  const max=Math.max(...data.map(d=>d.n),1);
  const W=340,H=80,BAR=28,GAP=16,PAD=20;
  return(
    <svg width={W} height={H+30} style={{overflow:'visible'}}>
      {data.map((d,i)=>{
        const x=PAD+i*(BAR+GAP);
        const barH=d.n===0?3:Math.max(8,(d.n/max)*(H-10));
        const y=H-barH;
        const isHov=hov===i;
        return(
          <g key={i} onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)} style={{cursor:'default'}}>
            {/* bar */}
            <rect x={x} y={y} width={BAR} height={barH} rx={5}
              fill={d.n===0?'var(--bg2)':isHov?'var(--accent-h)':'var(--accent)'}
              style={{transition:'fill .15s,y .4s,height .4s'}}/>
            {/* value on hover */}
            {isHov&&d.n>0&&(
              <text x={x+BAR/2} y={y-6} textAnchor="middle" style={{fontSize:11,fontWeight:700,fill:'var(--accent)',fontFamily:'Noto Sans JP'}}>{d.n}本</text>
            )}
            {d.n===0&&(
              <text x={x+BAR/2} y={H-8} textAnchor="middle" style={{fontSize:9,fill:'var(--text3)',fontFamily:'Noto Sans JP'}}>なし</text>
            )}
            {/* month label */}
            <text x={x+BAR/2} y={H+18} textAnchor="middle" style={{fontSize:11,fill:'var(--text3)',fontFamily:'Noto Sans JP'}}>{d.m}</text>
          </g>
        );
      })}
    </svg>
  );
}

/* ═══════════════════════════════
   HEATMAP
═══════════════════════════════ */
const HM_COLORS=['var(--bg2)','#fde8c8','#f5c07a','#e0893a','#c2722a'];
function cellColor(count){
  if(count===0)return HM_COLORS[0];
  if(count===1)return HM_COLORS[2];
  return HM_COLORS[4];
}

function Heatmap({cells}){
  const [tooltip,setTooltip]=useState(null);
  const DAY_LABELS=['','月','','水','','金',''];

  // month label positions
  const monthLabels=[];
  cells.forEach((col,wi)=>{
    const first=col.find(c=>c&&c.date);
    if(!first)return;
    if(first.date.getDate()<=7||(wi===0)){
      const m=first.date.getMonth()+1;
      monthLabels.push({wi,label:`${m}月`});
    }
  });

  return(
    <div style={{position:'relative'}}>
      {/* Month labels */}
      <div style={{display:'flex',gap:3,paddingLeft:22,marginBottom:4}}>
        {cells.map((col,wi)=>{
          const ml=monthLabels.find(m=>m.wi===wi);
          return(
            <div key={wi} style={{width:14,flexShrink:0,fontSize:10,color:'var(--text3)',fontWeight:600,letterSpacing:'.04em',overflow:'visible',whiteSpace:'nowrap'}}>
              {ml?ml.label:''}
            </div>
          );
        })}
      </div>
      {/* Grid */}
      <div style={{display:'flex',gap:3}}>
        {/* Day labels */}
        <div style={{display:'flex',flexDirection:'column',gap:3,marginRight:0}}>
          {DAY_LABELS.map((l,i)=>(
            <div key={i} style={{height:14,fontSize:10,color:'var(--text3)',width:20,textAlign:'right',display:'flex',alignItems:'center',justifyContent:'flex-end'}}>{l}</div>
          ))}
        </div>
        {cells.map((col,wi)=>(
          <div key={wi} style={{display:'flex',flexDirection:'column',gap:3}}>
            {col.map((cell,di)=>(
              <div key={di}
                className="hm-cell"
                style={{background:cell?cellColor(cell.count):'transparent',opacity:cell?1:0}}
                onMouseEnter={e=>{if(cell)setTooltip({x:e.clientX,y:e.clientY,text:`${cell.label} · ${cell.count===0?'更新なし':cell.count+'本更新'}`});}}
                onMouseLeave={()=>setTooltip(null)}
              />
            ))}
          </div>
        ))}
      </div>
      {/* Legend */}
      <div style={{display:'flex',alignItems:'center',gap:4,marginTop:10,justifyContent:'flex-end'}}>
        <span style={{fontSize:10,color:'var(--text3)'}}>少ない</span>
        {HM_COLORS.map((c,i)=><div key={i} style={{width:12,height:12,borderRadius:2,background:c,border:'1px solid var(--border)'}}/>)}
        <span style={{fontSize:10,color:'var(--text3)'}}>多い</span>
      </div>
      {tooltip&&(
        <div className="tooltip" style={{left:tooltip.x,top:tooltip.y}}>{tooltip.text}</div>
      )}
    </div>
  );
}

/* ═══════════════════════════════
   SCORE RING
═══════════════════════════════ */
function ScoreRing({score}){
  const R=26,circ=2*Math.PI*R;
  const dash=(score/100)*circ;
  return(
    <div className="score-ring">
      <svg width={64} height={64} viewBox="0 0 64 64">
        <circle cx={32} cy={32} r={R} fill="none" stroke="var(--bg2)" strokeWidth={7}/>
        <circle cx={32} cy={32} r={R} fill="none" stroke="var(--accent)" strokeWidth={7}
          strokeDasharray={`${dash} ${circ-dash}`}
          strokeDashoffset={circ/4}
          strokeLinecap="round"/>
      </svg>
      <div className="score-val" style={{fontSize:14}}>{score}</div>
    </div>
  );
}

/* ═══════════════════════════════
   ANALYTICS PANEL
═══════════════════════════════ */
function AnalyticsSection(){
  return(
    <div className="analytics-row">
      {/* Left: Donut */}
      <div className="chart-card">
        <div className="chart-title">記事テーマの分布</div>
        <div className="chart-sub">生成された記事素材のカテゴリ内訳</div>
        <DonutChart data={THEME_DATA}/>
      </div>

      {/* Right: Update graph + heatmap */}
      <div className="chart-card">
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:0}}>
          <div>
            <div className="chart-title">ホームページの更新状況</div>
            <div className="chart-sub">記事素材の生成・投稿の継続性</div>
          </div>
          <span className="badge badge-amber" style={{marginTop:2,fontSize:11}}>過去6ヶ月</span>
        </div>

        {/* Bar chart */}
        <div style={{marginBottom:16}}>
          <BarChart data={MONTHLY}/>
        </div>

        {/* Heatmap */}
        <div style={{paddingTop:16,borderTop:'1px solid var(--border)'}}>
          <div style={{fontSize:12,fontWeight:600,color:'var(--text2)',marginBottom:10}}>週次更新カレンダー（過去25週）</div>
          <Heatmap cells={HEATMAP}/>
        </div>

        {/* Score */}
        <div className="score-row">
          <ScoreRing score={68}/>
          <div className="score-meta">
            <div className="score-title">継続スコア：68 / 100</div>
            <div className="score-desc">月2〜3本のペースで更新できています。<br/>月4本以上を目指すとスコアが上がります。</div>
          </div>
          <a className="btn btn-primary btn-xs" href="CastPrepLoading.html">取材する →</a>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════
   APP
═══════════════════════════════ */
function App(){
  const hour=new Date().getHours();
  const greet=hour<12?'おはようございます':'こんにちは';
  return(
    <AppShell active="ダッシュボード" title="ダッシュボード" headerRight={
      <a className="btn btn-primary btn-sm" href="Projects.html">+ 取材先を追加</a>
    }>
      {/* Greeting bar */}
      <div style={{marginBottom:20,padding:'20px 24px',background:'linear-gradient(135deg,var(--accent-l),var(--teal-l))',borderRadius:16,border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',gap:24}}>
        <div>
          <div style={{fontFamily:'var(--serif)',fontSize:20,fontWeight:700,color:'var(--text)',marginBottom:5}}>{greet}、山田さん 👋</div>
          <div style={{fontSize:13,color:'var(--text2)'}}>今月の取材残り: <strong>1回</strong>（Free プラン・月2回まで）</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <div style={{width:60,height:6,background:'var(--accent)',borderRadius:3}}/>
            <div style={{width:60,height:6,background:'var(--border)',borderRadius:3}}/>
            <span style={{fontSize:11,color:'var(--text3)'}}>1 / 2</span>
          </div>
          <a className="btn btn-primary btn-sm" href="CastPrepLoading.html">今すぐ取材する →</a>
        </div>
      </div>

      {/* Stats */}
      <div className="stat-grid">
        {[
          {n:'4',l:'取材先',d:'先月比 +1'},
          {n:'12',l:'完了した取材',d:'先月比 +3'},
          {n:'8',l:'生成した記事',d:'先月比 +2'},
          {n:'68',l:'継続スコア',d:'目標: 80以上'},
        ].map(s=>(
          <div key={s.l} className="stat-card">
            <div className="stat-n">{s.n}</div>
            <div className="stat-l">{s.l}</div>
            <div className="stat-delta">{s.d}</div>
          </div>
        ))}
      </div>

      {/* ── ANALYTICS ── */}
      <AnalyticsSection/>

      {/* Quick actions */}
      <div className="quick-actions">
        <a className="qa-btn" href="Projects.html">
          <span style={{fontSize:26}}>🏢</span><span className="qa-label">取材先を追加する</span>
        </a>
        <a className="qa-btn" href="CastPrepLoading.html">
          <span style={{fontSize:26}}>🎤</span><span className="qa-label">取材を始める</span>
        </a>
        <a className="qa-btn" href="Articles.html">
          <span style={{fontSize:26}}>📄</span><span className="qa-label">記事素材を確認する</span>
        </a>
      </div>

      {/* Bottom: projects + interviews */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
        <div>
          <div className="section-head">
            <h2>取材先一覧</h2>
            <a className="btn btn-ghost btn-sm" href="Projects.html">すべて見る →</a>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {PROJECTS.map(p=>(
              <a key={p.name} className="project-card" href="Project.html">
                <div className="project-icon">{p.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700,color:'var(--text)',marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</div>
                  <div style={{fontSize:12,color:'var(--text3)'}}>{p.sub}</div>
                </div>
                <span className={`badge ${p.status}`}>{p.statusL}</span>
              </a>
            ))}
          </div>
        </div>
        <div>
          <div className="section-head">
            <h2>最近の取材</h2>
            <a className="btn btn-ghost btn-sm" href="Interviews.html">すべて見る →</a>
          </div>
          <div className="card" style={{padding:'4px 20px'}}>
            {INTERVIEWS.map((iv,i)=>(
              <div key={i} className="interview-row">
                <div className="cast-dot"><img src={iv.img} alt={iv.cast}/></div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:600,color:'var(--text)',marginBottom:2}}>{iv.project}</div>
                  <div style={{fontSize:12,color:'var(--text3)'}}>{iv.cast} · {iv.date}</div>
                </div>
                <span className={`badge ${iv.status}`}>{iv.statusL}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </AppShell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
