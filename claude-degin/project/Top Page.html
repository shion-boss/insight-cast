<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insight Cast — AIが取材して、記事の素材を届けます</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ── TOP PAGE SPECIFIC ── */
.hero{padding:112px 0 80px;background:linear-gradient(140deg,#fdf8f2 0%,#f6e9d8 55%,#ede0cc 100%)}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}
.hero-h1{font-size:clamp(36px,4.2vw,56px);font-weight:700;line-height:1.16;color:var(--text)}
.hero-h1 em{color:var(--accent);font-style:normal}
.hero-sub{font-size:16px;color:var(--text2);line-height:1.9;margin-top:20px;max-width:440px}
.hero-actions{display:flex;gap:12px;margin-top:28px;flex-wrap:wrap}
.proof-row{display:flex;gap:36px;margin-top:36px;padding-top:32px;border-top:1px solid var(--border)}
.proof-n{font-family:var(--serif);font-size:30px;font-weight:700;color:var(--accent);line-height:1}
.proof-l{font-size:12px;color:var(--text2);margin-top:5px}
.hero-img{border-radius:24px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.12);position:relative}
.hero-img img{width:100%;display:block}
.hero-badge{position:absolute;bottom:20px;left:20px;background:rgba(255,253,249,.92);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:12px;padding:10px 16px;font-size:12px;color:var(--text2);font-weight:600}

/* pain */
.pain-sec{background:var(--bg2)}
.pain-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:44px}
.pain-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:32px}
.pain-n{font-family:var(--serif);font-size:44px;font-weight:700;color:var(--border);line-height:1;margin-bottom:18px}
.pain-card h3{font-size:17px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.4}
.pain-card p{font-size:14px;color:var(--text2);line-height:1.8}

/* outcome */
.outcome-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:44px}
.outcome-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:32px;position:relative;overflow:hidden}
.outcome-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
.outcome-mark{font-size:20px;color:var(--accent);margin-bottom:18px;display:block}
.outcome-card h3{font-size:17px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.45}
.outcome-card p{font-size:14px;color:var(--text2);line-height:1.8}

/* workflow */
.wf-sec{background:var(--bg2)}
.steps{display:grid;grid-template-columns:repeat(3,1fr);position:relative;margin-top:56px}
.step-line{position:absolute;top:44px;left:calc(16.67% + 8px);right:calc(16.67% + 8px);height:1px;background:var(--border)}
.step{text-align:center;padding:0 32px}
.step-circle{width:88px;height:88px;border-radius:50%;background:var(--surface);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-family:var(--serif);font-size:22px;font-weight:700;color:var(--accent);position:relative;z-index:1}
.step h3{font-size:19px;font-weight:700;color:var(--text);margin-bottom:12px}
.step p{font-size:14px;color:var(--text2);line-height:1.85}

/* APP PREVIEW */
.preview-sec{background:var(--bg)}
.preview-tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content;margin:36px 0 28px}
.preview-tab{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .2s;border:none;background:transparent;font-family:var(--sans)}
.preview-tab.active{background:var(--surface);color:var(--accent);box-shadow:0 2px 8px var(--shadow)}
.browser-frame{border-radius:16px;overflow:hidden;border:1px solid var(--border);box-shadow:0 24px 64px rgba(0,0,0,.1)}
.browser-chrome{height:38px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:6px}
.b-dot{width:10px;height:10px;border-radius:50%}
.browser-url{flex:1;height:22px;background:var(--surface);border-radius:4px;margin:0 8px;display:flex;align-items:center;padding:0 10px;font-size:11px;color:var(--text3)}
.browser-body{background:var(--bg);display:flex;height:400px}
.mini-sidebar{width:180px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:16px 10px;display:flex;flex-direction:column;gap:3px}
.mini-logo{font-family:var(--serif);font-size:12px;font-weight:700;color:var(--text);padding:8px 8px 12px;border-bottom:1px solid var(--border);margin-bottom:8px}
.mini-logo em{color:var(--accent);font-style:normal}
.mini-link{padding:7px 9px;border-radius:6px;font-size:11px;font-weight:500;color:var(--text2);cursor:pointer}
.mini-link.a{background:var(--accent-l);color:var(--accent);font-weight:600}
.mini-main{flex:1;padding:24px;overflow:hidden}
.mini-h{font-family:var(--serif);font-size:16px;font-weight:700;color:var(--text);margin-bottom:16px}
.mini-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.mini-card-icon{width:32px;height:32px;border-radius:8px;background:var(--accent-l);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.mini-card-t{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.mini-card-s{font-size:11px;color:var(--text3)}
.mini-badge{font-size:10px;padding:2px 8px;border-radius:100px;font-weight:600;margin-left:auto;flex-shrink:0}
.chat-preview{flex:1;display:flex;flex-direction:column}
.chat-header-mini{height:48px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px}
.chat-avt-mini{width:28px;height:28px;border-radius:50%;overflow:hidden;border:1.5px solid var(--border)}
.chat-avt-mini img{width:100%;height:100%;object-fit:cover}
.chat-log-mini{flex:1;padding:16px;overflow:hidden;display:flex;flex-direction:column;gap:12px}
.chat-bubble-mini{padding:10px 13px;border-radius:12px;font-size:12px;line-height:1.6;max-width:80%}
.cb-cast{background:var(--surface);border:1px solid var(--border);color:var(--text);border-top-left-radius:3px}
.cb-user{background:var(--accent);color:#fff;border-top-right-radius:3px;margin-left:auto}
.chat-input-mini{height:44px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px}
.chat-input-field{flex:1;height:28px;background:var(--bg2);border-radius:6px;border:1px solid var(--border);padding:0 10px;font-size:11px;color:var(--text3);display:flex;align-items:center}
.article-preview{flex:1;padding:24px;overflow:hidden}
.article-preview h3{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px;line-height:1.45}
.article-preview p{font-size:12px;color:var(--text2);line-height:1.8;margin-bottom:10px}
.article-preview .copy-btn{font-size:11px;padding:5px 12px;background:var(--accent-l);color:var(--accent);border:none;border-radius:6px;cursor:pointer;font-weight:600;font-family:var(--sans)}

/* output example */
.output-sec{background:var(--bg2)}
.output-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:44px}
.output-panel{background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden}
.output-panel-header{padding:16px 22px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:10px}
.output-panel-title{font-size:13px;font-weight:700;color:var(--text)}
.output-panel-body{padding:22px}
.interview-q{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:6px}
.interview-a{font-size:13px;color:var(--text2);line-height:1.75;margin-bottom:20px;padding-left:14px;border-left:2px solid var(--border)}
.article-body p{font-size:14px;color:var(--text);line-height:1.85;margin-bottom:12px}
.article-body h4{font-family:var(--serif);font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px}

/* cast */
.cast-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:44px}
.cast-card{background:var(--surface);border:1px solid var(--border);border-radius:22px;overflow:hidden;transition:transform .25s,box-shadow .25s;cursor:pointer}
.cast-card:hover{transform:translateY(-6px);box-shadow:0 20px 56px rgba(0,0,0,.09)}
.cast-img{width:100%;aspect-ratio:1/1;object-fit:cover;object-position:top center}
.cast-body{padding:22px 24px 26px}
.cast-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.cast-name{font-family:var(--serif);font-size:21px;font-weight:700;color:var(--text)}
.cast-role{font-size:11px;color:var(--accent);font-weight:600;letter-spacing:.08em;margin-top:3px}
.cast-tagline{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:14px}
.cast-str{font-size:12px;color:var(--text2);display:flex;align-items:baseline;gap:7px;margin-top:6px}
.cast-str::before{content:'—';color:var(--accent);flex-shrink:0}
.addon-sep{display:flex;align-items:center;gap:12px;margin-top:40px;margin-bottom:16px}
.addon-sep span{font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap}
.addon-sep hr{flex:1;border:none;border-top:1px solid var(--border)}
.cast-grid-sm{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.cast-card-sm{background:var(--bg2);border:1px dashed var(--border);border-radius:18px;overflow:hidden;opacity:.72}
.cast-card-sm .cast-img{filter:grayscale(25%)}

/* compare */
.cmp-sec{background:var(--bg2)}
.cmp-wrap{margin-top:44px;border-radius:20px;overflow:hidden;border:1px solid var(--border)}
.cmp-wrap table{width:100%;border-collapse:collapse}
.cmp-wrap th{padding:16px 22px;font-size:13px;font-weight:700;text-align:center;border-bottom:1px solid var(--border);background:var(--surface);color:var(--text2)}
.cmp-wrap th:first-child{text-align:left;width:38%}
.cmp-wrap td{padding:15px 22px;font-size:14px;text-align:center;border-bottom:1px solid var(--border);color:var(--text3)}
.cmp-wrap td:first-child{text-align:left;color:var(--text);font-weight:500}
.cmp-wrap tr:last-child td{border-bottom:none}
.cmp-wrap .ic-col th{background:var(--accent);color:#fff}
.cmp-wrap .ic-col td{background:var(--accent-l)}
.ico-y{color:var(--teal);font-size:17px;font-weight:700}
.ico-n{color:var(--text3)}
.ico-h{color:var(--accent);font-size:13px;font-weight:600}

/* blog preview */
.blog-prev-sec{background:var(--bg)}
.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:44px}
.blog-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:transform .22s,box-shadow .22s;cursor:pointer}
.blog-card:hover{transform:translateY(-4px);box-shadow:0 16px 48px var(--shadow)}
.blog-cover{height:160px;display:flex;align-items:center;justify-content:center;font-size:32px}
.blog-body{padding:20px 22px}
.blog-cat{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.blog-title{font-family:var(--serif);font-size:16px;font-weight:700;color:var(--text);line-height:1.5;margin-bottom:10px}
.blog-meta{font-size:12px;color:var(--text3)}
.blog-more{text-align:center;margin-top:32px}

/* tweaks */
.tweaks-panel{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px;z-index:200;min-width:210px;box-shadow:0 8px 40px var(--shadow-lg);display:none}
.tweaks-panel.on{display:block}
.tw-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);margin-bottom:14px}
.tw-opt{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text);transition:background .15s;font-family:var(--sans);border:none;background:transparent;width:100%;text-align:left}
.tw-opt:hover{background:var(--bg2)}
.tw-opt.active{background:var(--accent-l);color:var(--accent);font-weight:600}
.tw-sw{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shared/components.jsx"></script>
<script type="text/babel">
const {useState,useEffect} = React;
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"theme":"cream"}/*EDITMODE-END*/;

const CASTS_FREE=[
  {id:'mint',name:'ミント',species:'ネコ',role:'Story Listener',tagline:'お客様目線で、やさしく引き出します',str:['初めて会った気がしない会話','お客様が感じる安心感・人柄','ふだんの気づかいや心がけ'],img:'uploads/portrait-half-e56f0f59.png'},
  {id:'claus',name:'クラウス',species:'フクロウ',role:'Industry Editor',tagline:'専門知識を背景に、技術の違いを言葉にします',str:['仕事のこだわりや判断基準','他社との技術・材料の違い','プロが分かる選び方の理由'],img:'uploads/portrait-half.png'},
  {id:'rain',name:'レイン',species:'キツネ',role:'Message Strategist',tagline:'お客様が選ぶ理由を、一緒に言葉にします',str:['なぜ選ばれているのかの言語化','競合との比較で見えてくる違い','HPで刺さる伝え方の軸'],img:'uploads/portrait-half-c748dc68.png'},
];
const CASTS_ADDON=[
  {name:'ハル',role:'Atmosphere Finder',img:'uploads/portrait-half-134e2225.png'},
  {name:'モグロ',role:'Yes / No Deep Dive',img:'uploads/portrait-half-29476351.png'},
  {name:'コッコ',role:'Campaign Voice',img:'uploads/portrait-half-35f1e736.png'},
];
const COMPARE=[
  {l:'ホームページの現状分析',ai:false,none:false},
  {l:'競合との比較',ai:false,none:false},
  {l:'一次情報の収集（取材）',ai:false,none:false},
  {l:'記事ネタのご提案',ai:'△',none:false},
  {l:'記事テキストの生成',ai:true,none:false},

];

  {q:'無料でどこまで使えますか？',a:'3名のキャスト（ミント・クラウス・レイン）によるAI取材を月2回ご利用いただけます。取材メモと記事素材の生成まで無料で体験できます。'},

  {q:'専門用語が多い業種でも大丈夫ですか？',a:'クラウスは業種の専門知識を背景に取材します。専門用語を使わずに話していただければ、価値を分かりやすく言語化します。'},
  {q:'途中でキャンセルできますか？',a:'有料プランは月次のサブスクリプションです。いつでもキャンセル可能で、翌月から課金は発生しません。'},
];
const BLOG_POSTS=[
  {cat:'ノウハウ',title:'ホームページを更新し続けるために必要な「取材思考」とは',date:'2026.04.10',color:'#fdf0e4',icon:'📝'},
  {cat:'サービス',title:'AIキャスト「クラウス」が専門業種の強みを引き出す仕組み',date:'2026.03.28',color:'#e0f5f3',icon:'🦉'},
  {cat:'事例',title:'工務店が Insight Cast を使って3ヶ月でコンテンツを5本作った話',date:'2026.03.15',color:'#f5ede0',icon:'🏠'},
];

function Nav(){
  const [scrolled,setScrolled]=useState(false);
  useEffect(()=>{const fn=()=>setScrolled(window.scrollY>20);window.addEventListener('scroll',fn);return()=>window.removeEventListener('scroll',fn);},[]);
  return(
    <nav className={`pub-nav${scrolled?' scrolled':''}`}>
      <div className="pub-nav-inner">
        <span className="pub-logo">Insight <em>Cast</em></span>
        <div className="pub-nav-links">
          {[['サービス','Service.html'],['料金','Pricing.html'],['キャスト','Cast.html'],['ブログ','Blog.html'],['About','About.html']].map(([l,h])=>(
            <a key={l} className="pub-nav-link" href={h}>{l}</a>
          ))}
        </div>
        <div className="flex gap-3">
          <a className="btn btn-ghost btn-sm" href="Login.html">ログイン</a>
          <a className="btn btn-primary btn-sm" href="Signup.html">無料で試す →</a>
        </div>
      </div>
    </nav>
  );
}

function Hero(){
  return(
    <section className="hero">
      <div className="container">
        <div className="hero-grid">
          <div>
            <div className="hero-eyebrow">✦ AIが取材して、記事の素材を届けます</div>
            <h1 className="hero-h1">あなたの話から、<br/><em>言葉の資産</em>が生まれる</h1>
            <p className="hero-sub">ホームページを更新したくても、何を書けばいいか分からない。Insight Castは、AIキャストがあなたに取材して、記事の素材として届けるサービスです。</p>
            <div className="hero-actions">
              <a className="btn btn-primary btn-lg" href="Signup.html">無料で取材を始める →</a>
              <a className="btn btn-outline" href="Service.html">サービスの流れを見る</a>
            </div>
            <div className="proof-row">
              <div><div className="proof-n">3名</div><div className="proof-l">無料キャスト</div></div>

}

function PainSec(){
  return(
    <section className="section pain-sec">
      <div className="container">
        <div className="label">Pain Points</div>
        <h2 className="heading mt-3">ホームページが止まっている、<br/>よくある理由</h2>
        <div className="pain-grid">
          {[
            {n:'01',t:'「何を書けばいいか分からない」',b:'コンテンツを作りたくても、どんな記事を書けばいいか見当がつかない。'},
            {n:'02',t:'「取材・撮影が大変で後回しになる」',b:'記事を作るには人手も時間もかかる。気づいたら数年前の情報のまま放置。'},
            {n:'03',t:'「自社の強みを言葉にできない」',b:'毎日やっていることが当たり前に見えて、何が価値なのか文章にするのが難しい。'},
          ].map(i=>(
            <div className="pain-card" key={i.n}>
              <div className="pain-n">{i.n}</div>
              <h3>{i.t}</h3>
              <p>{i.b}</p>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function OutcomeSec(){
  return(
    <section className="section">
      <div className="container">
        <div className="label">What You Get</div>
        <h2 className="heading mt-3">Insight Cast を使うと</h2>
        <div className="outcome-grid">
          {[

function App(){

    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);

  return(

}
