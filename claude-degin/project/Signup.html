<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新規登録 — Insight Cast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
body{min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(135deg,#fdf8f2 0%,#f0e5d0 100%)}
.auth-shell{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:100vh}
.auth-left{background:var(--accent);padding:60px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.auth-left::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.auth-left-logo{font-family:var(--serif);font-size:22px;font-weight:700;color:#fff;position:relative}
.auth-left-body{position:relative}
.auth-left h2{font-family:var(--serif);font-size:32px;font-weight:700;color:#fff;line-height:1.35;margin-bottom:24px}
.auth-left p{font-size:15px;color:rgba(255,255,255,.82);line-height:1.85;margin-bottom:32px}
.auth-proof{display:flex;flex-direction:column;gap:12px;position:relative}
.auth-proof-item{display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.9);font-size:14px}
.auth-proof-item::before{content:'✓';width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.auth-cast-row{display:flex;gap:-8px;position:relative}
.auth-cast-img{width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,255,255,.4);overflow:hidden;margin-right:-10px}
.auth-cast-img img{width:100%;height:100%;object-fit:cover;object-position:top}
.auth-right{display:flex;align-items:center;justify-content:center;padding:60px 48px}
.auth-form-wrap{width:100%;max-width:420px}
.auth-title{font-family:var(--serif);font-size:28px;font-weight:700;color:var(--text);margin-bottom:8px}
.auth-sub{font-size:14px;color:var(--text2);margin-bottom:32px}
.google-btn{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-size:14px;font-weight:600;color:var(--text);font-family:var(--sans);transition:border-color .2s,box-shadow .2s;margin-bottom:24px}
.google-btn:hover{border-color:var(--accent);box-shadow:0 2px 8px var(--shadow)}
.divider-label{display:flex;align-items:center;gap:12px;margin-bottom:24px;font-size:12px;color:var(--text3)}
.divider-label::before,.divider-label::after{content:'';flex:1;height:1px;background:var(--border)}
.form-stack{display:flex;flex-direction:column;gap:16px}
.auth-agree{font-size:12px;color:var(--text3);line-height:1.75;margin-top:4px}
.auth-agree a{color:var(--accent);text-decoration:underline;cursor:pointer}
.auth-switch{text-align:center;margin-top:20px;font-size:14px;color:var(--text2)}
.auth-switch a{color:var(--accent);font-weight:600;cursor:pointer}
.sent-state{text-align:center;padding:40px 0}
.sent-icon{font-size:64px;margin-bottom:20px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
function App(){
  const [step,setStep]=useState('form'); // form | sent
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [pw2,setPw2]=useState('');
  const [err,setErr]=useState('');
  const submit=e=>{
    e.preventDefault();
    if(!email){setErr('メールアドレスを入力してください');return;}
    if(pw.length<8){setErr('パスワードは8文字以上で入力してください');return;}
    if(pw!==pw2){setErr('パスワードが一致しません');return;}
    setStep('sent');
  };
  return(
    <div className="auth-shell">
      <div className="auth-left">
        <div className="auth-left-logo">Insight Cast</div>
        <div className="auth-left-body">
          <h2>AIが取材して、<br/>あなたの言葉を<br/>資産にします</h2>
          <p>登録はメールアドレスだけ。3名のキャストが今日から無料で使えます。</p>
          <div className="auth-proof">
            {['クレジットカード不要','取材は20分、チャット形式で気軽に','記事素材をすぐダウンロードできる'].map(t=>(
              <div key={t} className="auth-proof-item">{t}</div>
            ))}
          </div>
          <div style={{marginTop:32,display:'flex',gap:0}}>
            {['uploads/portrait-half-e56f0f59.png','uploads/portrait-half.png','uploads/portrait-half-c748dc68.png'].map((s,i)=>(
              <div key={i} className="auth-cast-img"><img src={s} alt=""/></div>
            ))}
            <div style={{marginLeft:18,display:'flex',alignItems:'center',color:'rgba(255,255,255,.8)',fontSize:13}}>3名のキャストが待っています</div>
          </div>
        </div>
        <div style={{fontSize:12,color:'rgba(255,255,255,.5)',position:'relative'}}>© 2026 Insight Cast</div>
      </div>
      <div className="auth-right">
        {step==='form'?(
          <div className="auth-form-wrap">
            <a href="Top Page.html" style={{fontSize:13,color:'var(--text3)',display:'block',marginBottom:28}}>← Insight Cast に戻る</a>
            <div className="auth-title">アカウントを作成</div>
            <div className="auth-sub">すでにアカウントをお持ちの方は <a href="Login.html" style={{color:'var(--accent)',fontWeight:600}}>ログイン</a></div>
            <button className="google-btn">
              <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
              Google で登録する
            </button>
            <div className="divider-label">または</div>
            <form onSubmit={submit} className="form-stack">
              <div className="form-group">
                <label className="form-label">メールアドレス<span className="req">*</span></label>
                <input className="input" type="email" placeholder="hello@example.com" value={email} onChange={e=>setEmail(e.target.value)}/>
              </div>
              <div className="form-group">
                <label className="form-label">パスワード<span className="req">*</span></label>
                <input className="input" type="password" placeholder="8文字以上" value={pw} onChange={e=>setPw(e.target.value)}/>
              </div>
              <div className="form-group">
                <label className="form-label">パスワード（確認）<span className="req">*</span></label>
                <input className="input" type="password" placeholder="もう一度入力" value={pw2} onChange={e=>setPw2(e.target.value)}/>
              </div>
              {err&&<div className="error-msg">⚠ {err}</div>}
              <div className="auth-agree">登録することで、<a>利用規約</a>および<a>プライバシーポリシー</a>に同意したものとみなされます。</div>
              <button className="btn btn-primary w-full" style={{justifyContent:'center',padding:'13px'}}>アカウントを作成する →</button>
            </form>
          </div>
        ):(
          <div className="auth-form-wrap">
            <div className="sent-state">
              <div className="sent-icon">📬</div>
              <h2 style={{fontFamily:'var(--serif)',fontSize:24,marginBottom:12}}>確認メールを送りました</h2>
              <p style={{fontSize:14,color:'var(--text2)',lineHeight:1.8,marginBottom:24}}>{email} に確認メールを送信しました。メール内のリンクをクリックしてアカウントを有効化してください。</p>
              <a href="app/Dashboard.html" className="btn btn-primary" style={{justifyContent:'center'}}>ダッシュボードへ →</a>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
