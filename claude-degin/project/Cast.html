<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キャスト紹介 — Insight Cast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
.cast-full{display:grid;grid-template-columns:340px 1fr;gap:56px;align-items:start;padding:56px 0;border-bottom:1px solid var(--border)}
.cast-full:last-child{border-bottom:none}
.cast-full-img{border-radius:24px;overflow:hidden;box-shadow:0 16px 48px var(--shadow)}
.cast-full-img img{width:100%;display:block}
.cast-species{font-size:13px;color:var(--text3);margin-bottom:6px}
.cast-full-name{font-family:var(--serif);font-size:36px;font-weight:700;color:var(--text);margin-bottom:6px}
.cast-full-role{font-size:13px;color:var(--accent);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px}
.cast-full-tagline{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--text);line-height:1.45;margin-bottom:20px;padding-left:16px;border-left:3px solid var(--accent)}
.cast-full p{font-size:15px;color:var(--text2);line-height:1.9;margin-bottom:12px}
.cast-spec{background:var(--bg2);border-radius:14px;padding:20px 24px;margin-top:20px}
.cast-spec-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.cast-spec-row:last-child{border-bottom:none}
.cast-spec-l{font-weight:600;color:var(--text);width:100px;flex-shrink:0}
.cast-spec-v{color:var(--text2);flex:1;line-height:1.7}
.addon-cast{display:grid;grid-template-columns:200px 1fr;gap:40px;align-items:start;padding:40px;background:var(--surface);border:1px solid var(--border);border-radius:20px;margin-bottom:16px;opacity:.75}
.addon-cast img{border-radius:18px;width:100%;display:block}
.input-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:var(--accent-l);color:var(--accent);border-radius:100px;font-size:12px;font-weight:600}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shared/components.jsx"></script>
<script type="text/babel">
const {useState}=React;
const NAV=[['サービス','Service.html'],['料金','Pricing.html'],['キャスト','Cast.html'],['ブログ','Blog.html'],['About','About.html']];

const FREE_CASTS=[
  {
    id:'mint',name:'ミント',species:'ネコ',role:'Story Listener',
    tagline:'お客様目線で、やさしく引き出します',
    img:'uploads/portrait-half-e56f0f59.png',
    desc:'親しみやすい雰囲気で、事業者が当たり前だと思っていることの中から、まだホームページで伝えられていない魅力を引き出します。初めての方でも安心して話せる、やさしい取材スタイルです。',
    specialty:'安心感・気づかい・サービスの温かさ',
    input:'テキスト（チャット形式）',
    strengths:['初めて会った気がしない会話の進め方','お客様が感じる安心感・人柄','ふだんの気づかいや心がけ'],
  },
  {
    id:'claus',name:'クラウス',species:'フクロウ',role:'Industry Editor',
    tagline:'専門知識を背景に、技術の違いを言葉にします',
    img:'uploads/portrait-half.png',
    desc:'業種の知識をもとに、技術・判断基準・こだわりをホームページで伝わる言葉として引き出します。「なぜその方法を選んでいるか」を深掘りすることで、専門性の価値を可視化します。',
    specialty:'専門性・判断基準・他社との違い',
    input:'テキスト（チャット形式）',
    strengths:['仕事のこだわりや判断基準','他社との技術・材料の違い','プロだから分かる選び方の理由'],
  },
  {
    id:'rain',name:'レイン',species:'キツネ',role:'Message Strategist',
    tagline:'お客様が選ぶ理由を、一緒に言葉にします',
    img:'uploads/portrait-half-c748dc68.png',
    desc:'マーケティング視点で、事業者がうまく言葉にできていない「なぜ選ばれているか」を引き出します。競合との違いを自然に浮かび上がらせ、HPやSNSで使えるメッセージの軸をつくります。',
    specialty:'訴求ポイント・強みの言語化・差別化',
    input:'テキスト（チャット形式）',
    strengths:['なぜ選ばれているのかの言語化','競合との比較で見えてくる違い','HPやSNSで刺さる伝え方の軸'],
  },
];

const ADDON_CASTS=[
  {name:'ハル',species:'コーギー',role:'Atmosphere Finder',tagline:'写真を起点に、その場所らしさを引き出します',img:'uploads/portrait-half-134e2225.png',input:'画像 + テキスト',desc:'お店や仕事場の写真を入り口に、人柄・スタッフとの関係・空気感を引き出す取材スタイル。'},
  {name:'モグロ',species:'もぐら',role:'Yes / No Deep Dive',tagline:'はい/いいえだけで、価値の輪郭を深掘りします',img:'uploads/portrait-half-29476351.png',input:'はい / いいえ',desc:'自由記述なし。二択の積み重ねで、まだ言葉になっていない価値を静かに掘り起こします。'},
  {name:'コッコ',species:'にわとり',role:'Campaign Voice',tagline:'「今伝えたいこと」を、発信できる言葉にします',img:'uploads/portrait-half-35f1e736.png',input:'テキスト',desc:'告知・キャンペーン・季節の話題など「今」に関わる内容をSNSやHPに使える言葉に落とし込みます。'},
];

function Nav(){
  const [sc,setSc]=useState(false);
  React.useEffect(()=>{const f=()=>setSc(window.scrollY>20);window.addEventListener('scroll',f);return()=>window.removeEventListener('scroll',f);},[]);
  return(
    <nav className={`pub-nav${sc?' scrolled':''}`}>
      <div className="pub-nav-inner">
        <a className="pub-logo" href="Top Page.html">Insight <em>Cast</em></a>
        <div className="pub-nav-links">{NAV.map(([l,h])=><a key={l} className={`pub-nav-link${l==='キャスト'?' active':''}`} href={h}>{l}</a>)}</div>
        <div className="flex gap-3"><a className="btn btn-ghost btn-sm" href="Login.html">ログイン</a><a className="btn btn-primary btn-sm" href="Signup.html">無料で試す →</a></div>
      </div>
    </nav>
  );
}

function App(){
  return(
    <>
    <Nav/>
    <section className="pub-hero-sm">
      <div className="container">
        <div className="flex gap-5 items-center" style={{gap:48}}>
          <div style={{flex:1}}>
            <div className="label">Cast</div>
            <h1 className="display mt-3">取材を担当する<br/>キャストたち</h1>
            <p className="body-lg mt-4">6名のキャストが、それぞれ異なる切り口でインタビューを行います。得意分野に合わせて選んでください。</p>
          </div>
          <div style={{flex:'0 0 480px'}}>
            <img src="uploads/about-team-hero.png" alt="キャスト集合" style={{borderRadius:20,width:'100%',boxShadow:'0 24px 64px rgba(0,0,0,.1)'}}/>
          </div>
        </div>
      </div>
    </section>

    {/* How to choose */}
    <section className="section-sm" style={{background:'var(--bg2)'}}>
      <div className="container">
        <h2 className="subheading">どのキャストを選べばいいですか？</h2>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginTop:24}}>
          {[
            {q:'自社の雰囲気や人柄を伝えたい',a:'→ ミント（Story Listener）'},
            {q:'技術・専門性の違いを言語化したい',a:'→ クラウス（Industry Editor）'},
            {q:'選ばれる理由・差別化を整理したい',a:'→ レイン（Message Strategist）'},
          ].map(i=>(
            <div key={i.q} className="card card-sm">
              <div style={{fontSize:14,color:'var(--text2)',marginBottom:8}}>{i.q}</div>
              <div style={{fontSize:14,fontWeight:700,color:'var(--accent)'}}>{i.a}</div>
            </div>
          ))}
        </div>
      </div>
    </section>

    {/* Free casts detail */}
    <section className="section">
      <div className="container">
        <div className="label">Free Cast</div>
        <h2 className="heading mt-3">無料キャスト</h2>
        <div style={{marginTop:48}}>
          {FREE_CASTS.map(c=>(
            <div className="cast-full" key={c.id}>
              <div>
                <div className="cast-full-img"><img src={c.img} alt={c.name}/></div>
                <div style={{marginTop:16,display:'flex',gap:8,flexWrap:'wrap'}}>
                  <span className="badge badge-teal">無料</span>
                  <span className="input-pill">入力: {c.input}</span>
                </div>
              </div>
              <div>
                <div className="cast-species">{c.species}</div>
                <div className="cast-full-name">{c.name}</div>
                <div className="cast-full-role">{c.role}</div>
                <div className="cast-full-tagline">{c.tagline}</div>
                <p>{c.desc}</p>
                <div className="cast-spec">
                  <div className="cast-spec-row"><span className="cast-spec-l">専門分野</span><span className="cast-spec-v">{c.specialty}</span></div>
                  <div className="cast-spec-row"><span className="cast-spec-l">得意なこと</span><span className="cast-spec-v">{c.strengths.map((s,i)=><span key={i} style={{display:'block'}}>• {s}</span>)}</span></div>
                  <div className="cast-spec-row"><span className="cast-spec-l">入力形式</span><span className="cast-spec-v">{c.input}</span></div>
                </div>
                <div style={{marginTop:24}}>
                  <a className="btn btn-primary" href="Signup.html">このキャストで取材を始める →</a>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>

    {/* Add-on casts */}
    <section className="section" style={{background:'var(--bg2)'}}>
      <div className="container">
        <div className="label">Add-on Cast</div>
        <h2 className="heading mt-3">追加キャスト（近日公開）</h2>
        <p className="body-lg mt-3">Proプランで利用可能になる予定のキャストです。</p>
        <div style={{marginTop:40}}>
          {ADDON_CASTS.map(c=>(
            <div className="addon-cast" key={c.name}>
              <div>
                <img src={c.img} alt={c.name} style={{filter:'grayscale(15%)'}}/>
                <div style={{marginTop:12,display:'flex',gap:8}}>
                  <span className="badge badge-gray">準備中</span>
                  <span className="badge badge-gray">入力: {c.input}</span>
                </div>
              </div>
              <div>
                <div className="cast-species">{c.species}</div>
                <div className="cast-full-name" style={{fontSize:28}}>{c.name}</div>
                <div className="cast-full-role">{c.role}</div>
                <div className="cast-full-tagline" style={{fontSize:17}}>{c.tagline}</div>
                <p style={{fontSize:14}}>{c.desc}</p>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>

    <div className="final-cta">
      <h2>キャストを選んで、取材を始めよう</h2>
      <p>登録はメールアドレスだけ。3名のキャストが今日から無料で使えます。</p>
      <div className="cta-actions">
        <a className="btn btn-white btn-lg" href="Signup.html">無料で取材を始める →</a>
        <a className="btn btn-ghost-white" href="Pricing.html">料金を見る</a>
      </div>
    </div>
    <footer className="pub-footer"><div className="pub-footer-in"><div className="f-logo">Insight Cast</div><div className="f-links">{['プライバシーポリシー','利用規約','特定商取引法に基づく表記'].map(l=><span key={l} className="f-link">{l}</span>)}</div><div className="f-copy">© 2026 Insight Cast</div></div></footer>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
